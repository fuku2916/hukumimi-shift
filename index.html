<style>
/* レスポンシブ：スマホ（<768px）は小さめフォント */
:root {
  --fs-cell: 18px;
  --fs-date: 18px;
  --fs-badge: 18px;
  --fs-slot: 18px;
  --fs-dow: 16px;
  --fs-nav: 20px;

/* v112: PCではメニュードロップダウンをクリップしない。スマホだけ左側ヘッダーを横スクロールにする */

/* v113: PCではヘッダー左側を横スクロール部品にしない。
   v110-112のスマホ対応でPCメニューが詰まる問題を防ぐ。v115で同期表示は非表示化。 */
@media (min-width: 769px) {
  .admin-header-inner { overflow: visible !important; }
  .admin-header-left-scroll {
    flex: 0 1 auto !important;
    overflow: visible !important;

    white-space: nowrap !important;

<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.22.5/babel.min.js"></script>
<script type="text/babel">
const { useState, useMemo, useEffect } = React;
const DAY_JP = ['日','月','火','水','木','金','土'];
// ── アプリの版番号（更新のたびにここだけ増やす：v8 → v9 → v10 …）──
const APP_VERSION = 'v154';
try{ document.title = 'シフト管理 ' + APP_VERSION; }catch(e){}

// ── アプリ自動更新（GitHub Pages/ブラウザのキャッシュで古い版が端末ごとに固定化するのを防ぐ）──
// 現在URLにユニークなクエリを付けて再読込し、キャッシュを必ずバイパスして最新HTMLを取得する。
function forceReloadLatest(){
  try{
    const sp=new URLSearchParams(location.search);
    sp.set('_r', Date.now().toString()); // 毎回変わる値でキャッシュ回避
    location.replace(location.pathname+'?'+sp.toString()+location.hash);
  }catch(e){ try{location.reload();}catch(_){} }
}
// サーバー上の最新HTMLから APP_VERSION だけを読み取る（no-store＋ユニークURLで必ず実体を取得）。
async function fetchLatestAppVersion(){
  try{
    const res=await fetch(location.pathname+'?_cv='+Date.now(),{cache:'no-store',headers:{'Range':'bytes=0-8191'}});
    if(!res.ok && res.status!==206) return null;
    const txt=await res.text();
    const m=txt.match(/APP_VERSION\s*=\s*'([^']+)'/);
    return m?m[1]:null;
  }catch(e){ return null; }
}
// 更新リロードをまたいで「ログイン中スタッフ・タブ・表示月」を復元するための一時保存（sessionStorage）。
// sessionStorage はリロードでは残るが、アプリを完全に閉じると消える＝恒久ログインにはせず、更新時だけ画面を維持する。
function loadResume(){try{const r=sessionStorage.getItem('fukumimi_resume');return r?JSON.parse(r):null;}catch(e){return null;}}
function saveResume(o){try{sessionStorage.setItem('fukumimi_resume',JSON.stringify(o));}catch(e){}}
function clearResume(){try{sessionStorage.removeItem('fukumimi_resume');}catch(e){}}
// 起動時：古い版を開いていたら自動で最新へ。1セッションにつき同じ版へのリロードは1回だけ（無限ループ防止）。
(async()=>{
  const latest=await fetchLatestAppVersion();
  if(latest && latest!==APP_VERSION){
    let already='';try{already=sessionStorage.getItem('fukumimi_autoReloadedTo')||'';}catch(e){}
    if(already!==latest){
      try{sessionStorage.setItem('fukumimi_autoReloadedTo',latest);}catch(e){}
      forceReloadLatest();
    }
  }
})();

// ── 診療枠カラーパレット ──
const SLOT_COLORS = {
  blue:  {border:'#378ADD',bgLight:'rgba(230,241,251,.15)',text:'#0C447C',bgDetail:'#E6F1FB'},
  pink:  {border:'#D4537E',bgLight:'rgba(251,234,240,.15)',text:'#993556',bgDetail:'#FBEAF0'},
  green: {border:'#1D9E75',bgLight:'rgba(230,247,242,.15)',text:'#166534',bgDetail:'#DCFCE7'},
  purple:{border:'#7F77DD',bgLight:'rgba(240,238,252,.15)',text:'#4B44AA',bgDetail:'#EDE9FE'},
  orange:{border:'#D85A30',bgLight:'rgba(252,241,236,.15)',text:'#9A3412',bgDetail:'#FFEDD5'},
  gold:  {border:'#BA7517',bgLight:'rgba(251,244,226,.15)',text:'#92400E',bgDetail:'#FEF3C7'},
  // 時間帯カラー（ラベル自動判定用）
  am:    {border:'#1D6FCC',bgLight:'rgba(225,240,255,.25)',text:'#0C447C',bgDetail:'#DBEAFE'}, // 午前=青
  noon:  {border:'#C05C00',bgLight:'rgba(255,237,213,.25)',text:'#9A3412',bgDetail:'#FFEDD5'}, // 昼=橙
  pm:    {border:'#6D28D9',bgLight:'rgba(237,233,254,.25)',text:'#4C1D95',bgDetail:'#EDE9FE'}, // 夜=紫
};
// コマ色はlabel（名前）で自動判定。colorIdは無視。
function getStaffTimeStr(sSlots, staffNotes) {
  try {
    var minS=9999, maxE=-1;
    for (var i=0; i<sSlots.length; i++) {
      var t = (sSlots[i].time||'').replace(/[－–—〜ー]/g,'-');
      var idx = t.indexOf('-');
      if (idx < 1) continue;
      var sp = t.slice(0,idx), ep = t.slice(idx+1);
      var sm = sp.match(/(\d{1,2}):(\d{2})/), em = ep.match(/(\d{1,2}):(\d{2})/);
      if (sm) { var sv=parseInt(sm[1])*60+parseInt(sm[2]); if(sv<minS) minS=sv; }
      if (em) { var ev=parseInt(em[1])*60+parseInt(em[2]); if(ev>maxE) maxE=ev; }
    }
    var fmt = function(m) { return m>=0&&m<9999 ? Math.floor(m/60)+':'+(m%60<10?'0':'')+(m%60) : ''; };
    var startStr = fmt(minS), endStr = fmt(maxE);
    var notes = staffNotes||'';
    var lm = notes.match(/(\d{1,2})(?::(\d{2}))?時?まで/);
    if (lm && notes.indexOf('以降') === -1 && notes.indexOf('から') === -1) {
      var lim = parseInt(lm[1])*60 + (lm[2]?parseInt(lm[2]):0);
      var limStr = Math.floor(lim/60)+':'+(lim%60<10?'0':'')+(lim%60);
      if (maxE > lim) endStr = endStr+'(退'+limStr+')';
    }
    return { startStr: startStr, endStr: endStr };
  } catch(e) { return { startStr:'', endStr:'' }; }
}

// ── 退勤時刻の表記用ヘルパー（管理カレンダー等で「(帰18:00)」を出す）──
function staffLeaveLimitMin(notes){
  if(!notes)return null;
  var n=(''+notes).replace(/[０-９]/g,function(c){return String.fromCharCode(c.charCodeAt(0)-0xFEE0);}).replace(/：/g,':');
  // 「X時まで」を拾う。ただし「X時以降/Xから/Xより」は退勤制限ではないので除外
  var m=n.match(/(\d{1,2})(?::(\d{2}))?時?まで(?![\s\S]*(?:以降|から|より))/);
  if(!m)return null;
  return parseInt(m[1])*60+(m[2]?parseInt(m[2]):0);
}
// 「X時以降 / Xから」勤務可能の出勤開始時刻（分）。なければnull
function staffStartLimitMin(notes){
  if(!notes)return null;
  var n=(''+notes).replace(/[０-９]/g,function(c){return String.fromCharCode(c.charCodeAt(0)-0xFEE0);}).replace(/：/g,':');
  var m=n.match(/(\d{1,2})(?::(\d{2})|時(?:(\d{1,2})分)?)?\s*(?:以降|から)/);
  if(!m)return null;
  return parseInt(m[1])*60+(m[2]?parseInt(m[2]):(m[3]?parseInt(m[3]):0));
}
function slotRangeMin(slot){
  var t=((slot&&slot.time)||'').replace(/[－–—〜ー]/g,'-');
  var idx=t.indexOf('-'); if(idx<1)return null;
  var sm=t.slice(0,idx).match(/(\d{1,2}):(\d{2})/), em=t.slice(idx+1).match(/(\d{1,2}):(\d{2})/);
  return {s:sm?parseInt(sm[1])*60+parseInt(sm[2]):null, e:em?parseInt(em[1])*60+parseInt(em[2]):null};
}
function fmtHM(m){return Math.floor(m/60)+':'+(m%60<10?'0':'')+(m%60);}
function hmToMin(x){if(x==null||x==='')return null;var m=(''+x).match(/(\d{1,2}):(\d{2})/);return m?parseInt(m[1])*60+parseInt(m[2]):null;}
// 曜日別の退勤/出勤の制限（分）。cond.dayTimes[dow] → cond.end/start（全曜日共通）→ 旧notes解析 の順で参照
function staffEndMin(s,dow){
  if(!s)return null; var c=s.cond;
  if(c&&c.dayTimes&&c.dayTimes[dow]&&c.dayTimes[dow].e)return hmToMin(c.dayTimes[dow].e);
  if(c&&c.end)return hmToMin(c.end);
  return staffLeaveLimitMin(s.notes);
}
function staffStartMin(s,dow){
  if(!s)return null; var c=s.cond;
  if(c&&c.dayTimes&&c.dayTimes[dow]&&c.dayTimes[dow].s)return hmToMin(c.dayTimes[dow].s);
  if(c&&c.start)return hmToMin(c.start);
  return staffStartLimitMin(s.notes);
}
// 午前手術＋午後手術の「通し」は6時間勤務(9:30→15:30)として退勤を15:30に丸める労務ルール。
// 重要：固定ID('am_surg'等)ではなく「その曜日に現在ある手術コマ」を時間帯で判定する。
// これにより、コマID変更で残った古い割当（例: 旧'am_surg'）に引っ張られて誤って15:30になる不具合を防ぐ。
// v107: 午前手術・午後手術の双方に「本人以外の在席者」がいる場合は、その人達がいる間に中抜け休憩を
//       取れる＝通し(連続6h)ではないので、15:30キャップを適用しない（本人の通常退勤まで働ける）。
//       例: 午前手術=北口+青木 / 午後手術=大滝+青木 なら、青木は休憩を挟んで18:00まで在席可。
//       本人しか手術コマにいない（真の通し）場合は従来どおり15:30で打ち切る。
function daySlotsForDow(dow){
  return (SLOTS_BY_DOW&&SLOTS_BY_DOW[dow])||(SLOTS&&SLOTS[dow])||[];
}
function bothSurgeryCap(da,sid,dow,excl){
  if(!da||sid==null)return null;
  var daySlots=daySlotsForDow(dow);
  // 本人が入っている「現在の手術コマ」だけを集める（存在しない古いコマIDは無視）。
  // 除外（手動で外した）コマは通し判定に含めない。
  var amSlots=[],pmSlots=[];
  daySlots.forEach(function(sl){
    if(!sl||sl.type!=='surg')return;
    if((da[sl.id]||[]).indexOf(sid)<0)return;
    if(excl&&(excl[sl.id]||[]).indexOf(sid)>=0)return; // このコマは除外されているので通しに数えない
    var r=slotRangeMin(sl); if(!r||r.s==null)return;
    if(r.s<12*60)amSlots.push(sl); else pmSlots.push(sl);
  });
  if(!(amSlots.length&&pmSlots.length))return null; // 通しでない
  // v107: 双方の手術コマに本人以外の在席者がいれば、中抜け休憩が可能なのでキャップしない
  var hasOther=function(list){
    return list.some(function(sl){
      return (da[sl.id]||[]).some(function(o){
        return o!==sid && !(excl&&(excl[sl.id]||[]).indexOf(o)>=0);
      });
    });
  };
  if(hasOther(amSlots)&&hasOther(pmSlots))return null;
  return (15*60+30); // 本人しかいない＝真の通し → 15:30
}
// その日の実効退勤時刻（分）。通し手術なら15:30で打ち切る。excl=その日の除外マップ(manualExclusions[dk])
function effEndMin(s,dow,da,excl){
  var lim=staffEndMin(s,dow);
  var cap=bothSurgeryCap(da,s&&s.id,dow,excl);
  if(cap!=null)lim=(lim==null)?cap:Math.min(lim,cap);
  return lim;
}
// そのスタッフがそのコマ(その曜日)で早退するなら「(帰H:MM)」を返す
function leaveNoteForSlot(s,slot,dow,da,excl){
  var lim=effEndMin(s,dow,da,excl); if(lim==null)return '';
  var r=slotRangeMin(slot); if(!r||r.e==null)return '';
  if(r.e>lim && (r.s==null || r.s<lim)) return '(帰'+fmtHM(lim)+')';
  return '';
}
// そのスタッフがそのコマ(その曜日)で実際に在席できる分数
function slotCoveredMinutes(s,slot,dow){
  var r=slotRangeMin(slot); if(!r||r.s==null||r.e==null)return 0;
  var lv=staffEndMin(s,dow), st=staffStartMin(s,dow);
  var start=r.s, end=r.e;
  if(st!=null && st>start) start=st;
  if(lv!=null && lv<end) end=lv;
  return Math.max(0, end-start);
}
// そのコマ(その曜日)の「半分以上」在席できるか
function canCoverSlot(s,slot,dow){
  var r=slotRangeMin(slot); if(!r||r.s==null||r.e==null)return true;
  var dur=r.e-r.s; if(dur<=0)return true;
  return slotCoveredMinutes(s,slot,dow) >= dur*0.5;
}
// 「ベースシフト固定」スタッフか（自動配置で追加・移動の対象外。ベースシフト通りにだけ配置）
function isBaseOnly(s){ return !!(s && s.cond && s.cond.baseOnly); }
// その曜日(dow)に勤務可能な設定か（勤務できる曜日 cond.days を参照。未設定なら可とみなす）
function staffWorksDow(s,dow){
  if(!s)return false;
  var c=s.cond;
  if(c&&c.days&&Object.keys(c.days).length) return c.days[dow]!==false;
  return true;
}
// 勤務条件（曜日＋時間帯）からして、そのコマに本来出勤できるか
function staffEligibleForSlot(s,slot,dow){
  return staffWorksDow(s,dow) && canCoverSlot(s,slot,dow);
}
// スキル（担当可能なコマ種別）を勤務条件メモから判定: 'out'=外来のみ / 'surg'=手術のみ / 'both'=両方
function staffSkill(s){
  if(!s)return 'both';
  var t=((s.notes||'')+' '+(s.memo||'')).replace(/[\s　]/g,'');
  if(/手術のみ/.test(t))return 'surg';
  if(/外来のみ/.test(t))return 'out';
  return 'both';
}
function skillLabel(sk){return sk==='surg'?'手術のみ':sk==='out'?'外来のみ':'外来・手術可';}
// そのスタッフがそのコマ(その曜日)で実際に在席できる時間帯 {s,e}（出勤開始/退勤制限を反映）。在席不可ならnull
function staffPresenceInSlot(s,slot,dow,da,excl){
  var r=slotRangeMin(slot); if(!r||r.s==null||r.e==null)return null;
  var a=r.s, b=r.e;
  var st=staffStartMin(s,dow), lv=effEndMin(s,dow,da,excl);
  if(st!=null&&st>a)a=st;
  if(lv!=null&&lv<b)b=lv;
  if(b<=a)return null;
  return {s:a,e:b};
}
// 在席時間帯の配列から、コマ範囲r内で在席者が0名になる「最初の無人帯」{s,e}を返す。無人帯がなければnull。
function firstUncoveredBand(r,intervals){
  if(!r||r.s==null||r.e==null)return null;
  var iv=(intervals||[]).filter(function(x){return x&&x.s!=null&&x.e!=null&&x.e>x.s;}).slice().sort(function(a,b){return a.s-b.s;});
  var cur=r.s;
  for(var i=0;i<iv.length;i++){
    var x=iv[i];
    if(x.s>cur)return {s:cur,e:Math.min(x.s,r.e)};
    if(x.e>cur)cur=x.e;
    if(cur>=r.e)return null;
  }
  if(cur<r.e)return {s:cur,e:r.e};
  return null;
}

// 日時スタンプ整形（作成日時表示用）"2026/7/4 14:30"
function fmtStamp(iso){
  if(!iso)return '';
  try{const d=new Date(iso);if(isNaN(d))return '';
    const p=n=>String(n).padStart(2,'0');
    return d.getFullYear()+'/'+(d.getMonth()+1)+'/'+d.getDate()+' '+p(d.getHours())+':'+p(d.getMinutes());
  }catch(e){return '';}
}
// 印刷用ウインドウに「🖨 印刷」ボタンを差し込む（自動印刷はせず、押したときだけ印刷）
function injectPrintButton(printWin){
  try{
    const st=printWin.document.createElement('style');
    st.textContent='@media print{.__noprint{display:none!important}}';
    printWin.document.head.appendChild(st);
    const btn=printWin.document.createElement('button');
    btn.textContent='🖨 印刷';
    btn.className='__noprint';
    btn.setAttribute('style','position:fixed;top:10px;right:10px;z-index:99999;padding:10px 16px;font-size:15px;font-weight:700;background:#185FA5;color:#fff;border:none;border-radius:10px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.25)');
    btn.onclick=function(){printWin.print();};
    printWin.document.body.appendChild(btn);
  }catch(e){}
}

function getSlotColor(slot){
  const label=slot?.label||'';
  if(label.includes('夜'))  return SLOT_COLORS.pm;
  if(label.includes('昼'))  return SLOT_COLORS.noon;
  if(label.includes('午後')) return SLOT_COLORS.noon;
  return SLOT_COLORS.am; // 午前外来・午前手術・その他
}
// ラベルからcolorIdを取得（診療枠設定のプレビュー用）
function labelToColorId(label){
  if(!label)return'am';
  if(label.includes('夜'))return'pm';
  if(label.includes('昼')||label.includes('午後'))return'noon';
  return'am';
}

// ── 診療枠マスタ（h は労働時間計算用・変更不可、colorId は編集可） ──
const SLOTS = {
  1:[ // 月曜：午後手術のみ
    {id:'am_out', label:'午前外来',  time:'9:30-13:00',  type:'out',  h:3.5, colorId:'blue'},
    {id:'surg',   label:'午後手術',  time:'13:00-16:00', type:'surg', h:3.0, colorId:'pink'},
    {id:'pm1',    label:'昼外来',    time:'14:00-16:00', type:'out',  h:2.0, colorId:'blue'},
    {id:'pm2',    label:'夜外来',    time:'16:00-19:30', type:'out',  h:3.5, colorId:'blue'},
  ],
  2:[ // 火曜：午前手術のみ
    {id:'am_out',  label:'午前外来', time:'9:30-13:00', type:'out',  h:3.5, colorId:'blue'},
    {id:'am_surg', label:'午前手術', time:'9:30-13:00', type:'surg', h:3.5, colorId:'pink'},
  ],
  3:[ // 水曜：午前手術＋午後手術
    {id:'am_out',  label:'午前外来', time:'9:30-13:00',  type:'out',  h:3.5, colorId:'blue'},
    {id:'surg',    label:'午前手術', time:'9:30-15:00',  type:'surg', h:5.5, colorId:'pink'},
    {id:'pm_surg', label:'午後手術', time:'13:00-19:00', type:'surg', h:6.0, colorId:'pink'},

// ── 日本の祝日計算 ──
function calcEquinox(year, isSpring){
  // 春分・秋分の日の計算式（天文台式近似）
  const x=year-1980;
  if(isSpring) return Math.floor(20.8431+0.242194*x-Math.floor(x/4));
  else         return Math.floor(23.2488+0.242194*x-Math.floor(x/4));
}
function nthWeekday(year,month,wday,n){
  const d=new Date(year,month-1,1); let c=0;
  while(d.getMonth()===month-1){if(d.getDay()===wday){c++;if(c===n)return new Date(d);}d.setDate(d.getDate()+1);}
  return null;
}
function getJapaneseHolidays(year){
  const h={};
  function add(y,mo,da,name){ const d=new Date(y,mo-1,da); if(d.getFullYear()===y) h[tdk(d)]=name; }
  function addD(d,name){ if(d) h[tdk(d)]=name; }

  add(year,1,1,'元日');
  addD(nthWeekday(year,1,1,2),'成人の日');
  add(year,2,11,'建国記念の日');
  if(year>=1989) add(year,2,23,'天皇誕生日');
  add(year,3,calcEquinox(year,true),'春分の日');
  add(year,4,29,'昭和の日');
  add(year,5,3,'憲法記念日');
  add(year,5,4,'みどりの日');
  add(year,5,5,'こどもの日');
  addD(nthWeekday(year,7,1,3),'海の日');
  add(year,8,11,'山の日');
  addD(nthWeekday(year,9,1,3),'敬老の日');
  add(year,9,calcEquinox(year,false),'秋分の日');
  addD(nthWeekday(year,10,1,2),'スポーツの日');
  add(year,11,3,'文化の日');
  add(year,11,23,'勤労感謝の日');

  // 振替休日（日曜が祝日→翌月曜、その月曜も祝日なら火曜…）
  const before={...h};
  Object.keys(before).forEach(dk=>{
    const d=new Date(dk);
    if(d.getDay()===0){
      const next=new Date(d);
      next.setDate(next.getDate()+1);
      while(h[tdk(next)]) next.setDate(next.getDate()+1);
      h[tdk(next)]='振替休日';
    }
  });

  // 国民の祝日（祝日に挟まれた平日）
  const sorted=Object.keys(h).sort();
  sorted.forEach(dk=>{
    const d=new Date(dk);
    const prev=new Date(d); prev.setDate(prev.getDate()-2);
    const next=new Date(d); next.setDate(next.getDate()+2);
    const mid=new Date(d); mid.setDate(mid.getDate()-1);
    if(h[tdk(prev)]&&h[tdk(d)]&&!h[tdk(mid)]&&mid.getDay()!==0&&mid.getDay()!==6)
      h[tdk(mid)]='国民の祝日';
  });
  return h;
}

function minToHM2(m){if(m==null||m==='')return '';return Math.floor(m/60)+':'+String(m%60).padStart(2,'0');}
function defaultCond(){const dt={};[1,2,3,4,5,6].forEach(d=>{dt[d]={s:'',e:''};});return {days:{1:true,2:true,3:true,4:true,5:true,6:true},dayTimes:dt,weekMinH:'',weekMaxH:'',slot:'both',emp:'',baseOnly:false};}
// 入力式の値から、AI・判定が読める“決まった書式”の条件文を生成（曜日別の勤務時間に対応）
function condToNotes(c){
  if(!c)return '';
  const L=[];
  if(c.emp==='fulltime')L.push('【常勤】'); else if(c.emp==='parttime')L.push('【パート】');
  if(c.days){const a=[1,2,3,4,5,6].filter(d=>c.days[d]); if(a.length>0&&a.length<6)L.push(a.map(d=>DAY_JP[d]).join('・')+'勤務可能');}
  if(c.slot==='surg')L.push('手術のみ'); else if(c.slot==='out')L.push('外来のみ'); else if(c.slot==='both')L.push('外来・手術いずれも可');
  const mn=c.weekMinH, mx=c.weekMaxH;
  if(mn&&mx)L.push(mn+'時間以上'+mx+'時間以内'); else if(mx)L.push(mx+'時間以内'); else if(mn)L.push(mn+'時間以上');
  // 曜日別の勤務可能時間
  const dt=c.dayTimes||{};
  [1,2,3,4,5,6].forEach(d=>{
    if(c.days&&!c.days[d])return;
    const t=dt[d]; if(!t||(!t.s&&!t.e))return;
    if(t.s&&t.e)L.push(DAY_JP[d]+'曜は'+t.s+'〜'+t.e+'勤務可能');
    else if(t.e)L.push(DAY_JP[d]+'曜は'+t.e+'まで勤務可能');
    else if(t.s)L.push(DAY_JP[d]+'曜は'+t.s+'以降勤務可能');
  });
  return L.join('\n');
}
// 既存の自由文を入力式に best-effort 変換（移行用）。元の文はmemoに保持
function notesToCond(notes){
  const c=defaultCond();
  const lv=staffLeaveLimitMin(notes), st=staffStartLimitMin(notes), wh=parseWeeklyHours(notes), emp=parseEmploymentType(notes);
  if(wh){ if(wh.min)c.weekMinH=wh.min; if(wh.max&&wh.max<40)c.weekMaxH=wh.max; }
  if(emp)c.emp=emp;
  if(/手術のみ|手術室のみ/.test(notes||''))c.slot='surg'; else if(/外来のみ/.test(notes||''))c.slot='out'; else c.slot='both';
  ['月','火','水','木','金','土'].forEach((j,i)=>{ if(new RegExp(j+'曜?(?:不可|休)').test(notes||''))c.days[i+1]=false; });
  // 旧データは全曜日共通の時刻 → 許可曜日すべてに同じ時刻を入れる
  const sHM=st!=null?minToHM2(st):'', eHM=lv!=null?minToHM2(lv):'';
  [1,2,3,4,5,6].forEach(d=>{ c.dayTimes[d]={s:c.days[d]?sHM:'', e:c.days[d]?eHM:''}; });
  return {cond:c, memo:notes||''};
}

// ── パターン適用後に週間時間上限を超えた割当を週内均等分散で除去（グローバル）──
function enforceHourLimits(rawAsgn, staff, weeks, slots, pinned, reqMap){
  pinned = pinned || new Set(); // "dk|slotId|staffId" 形式：ベースシフト分は絶対に削らない
  reqMap = reqMap || {};        // "dk|slotId" → 必要人数。必要数を下回る削除はしない（被覆優先）
  const na={};
  Object.entries(rawAsgn).forEach(([dk,sm])=>{
    na[dk]={};
    Object.entries(sm).forEach(([slotId,ids])=>{na[dk][slotId]=[...(ids||[])];});
  });

  staff.forEach(s=>{
    const wh=parseWeeklyHours(s.notes);
    if(!wh||wh.max<=0) return;
    const maxH=Math.min(wh.max, WEEKLY_LIMIT);

    weeks.forEach(weekDates=>{
      const assigned=[];
      weekDates.forEach(d=>{
        const dk=tdk(d), dow=d.getDay();
        (slots[dow]||[]).forEach(slot=>{
          if((na[dk]?.[slot.id]||[]).includes(s.id)){
            assigned.push({dk, dow, slotId:slot.id, h:slotHours(dow,slot.id,slots), pin:pinned.has(dk+'|'+slot.id+'|'+s.id)});
          }
        });
      });
      if(assigned.length===0) return;

      // 実労働時間（拘束−休憩・退勤打ち切り）で週上限を判定（重複コマの二重計上を防ぐ）
      const totalH=weekDates.reduce((sum,d)=>sum+dayHours(tdk(d),s.id,na,{},slots,staff),0);
      if(totalH<=maxH) return;

      // 曜日ごとにグループ化してラウンドロビン選択
      const byDay={};
      assigned.forEach(a=>{
        if(!byDay[a.dow]) byDay[a.dow]=[];
        byDay[a.dow].push(a);
      });
      const days=Object.keys(byDay).sort((a,b)=>Number(a)-Number(b));

      const kept=new Set();
      let accumulated=0;
      // ① ベースシフト（pinned）は無条件で残す（金土が削られないように）
      assigned.forEach(a=>{
        if(a.pin){kept.add(a.dk+'|'+a.slotId);accumulated+=a.h;}
      });
      // ② 残り（非ベース）を曜日ラウンドロビンで上限まで残す
      let changed=true;
      while(changed){
        changed=false;
        for(const dow of days){
          const notYet=byDay[dow].filter(a=>!a.pin&&!kept.has(a.dk+'|'+a.slotId));
          if(notYet.length===0) continue;
          const next=notYet[0];
          if(accumulated+next.h<=maxH){
            kept.add(next.dk+'|'+next.slotId);
            accumulated+=next.h;
            changed=true;
          }
        }
      }

      assigned.forEach(a=>{
        if(!kept.has(a.dk+'|'+a.slotId)){
          // 必要人数を下回る削除はしない（埋めた枠を時間調整で空けない）
          const req=reqMap[a.dk+'|'+a.slotId]||0;
          const slotCount=(na[a.dk][a.slotId]||[]).length;
          if(slotCount<=req) return;
          na[a.dk][a.slotId]=(na[a.dk][a.slotId]||[]).filter(sid=>sid!==s.id);
        }
      });
    });
  });
  return na;
}
function parseWeeklyHours(notes){
  if(!notes)return null;
  // 全角→半角に正規化
  const n=notes
    .replace(/[０-９]/g,c=>String.fromCharCode(c.charCodeAt(0)-0xFEE0))
    .replace(/[~～]/g,'〜');
  const m1=n.match(/(\d+)\s*時間以上[、,\s]*(\d+)\s*時間以内/);
  if(m1) return {min:parseInt(m1[1]),max:parseInt(m1[2])};
  const m2=n.match(/(\d+)\s*[〜~～]\s*(\d+)\s*時間/);
  if(m2) return {min:parseInt(m2[1]),max:parseInt(m2[2])};
  const m3=n.match(/(\d+)\s*時間以上/);
  if(m3) return {min:parseInt(m3[1]),max:40};
  const m4=n.match(/(\d+)\s*時間以内/);
  if(m4) return {min:0,max:parseInt(m4[1])};
  const m5=n.match(/週\s*(\d+)\s*時間/);
  if(m5) return {min:Math.round(parseInt(m5[1])*0.8),max:parseInt(m5[1])};
  return null;
}
// slotHours: slotsState(編集後)優先、なければ SLOTS マスタ参照
function slotHours(dow,slotId,slotsState){
  const src=slotsState||SLOTS;
  return (src[dow]||[]).find(s=>s.id===slotId)?.h||0;
}
// スタッフID→スタッフ情報 の参照表（曜日別の退勤時刻などを参照するため。Appが更新する）
var STAFF_OBJ_LOOKUP={};
// 曜日→現在の診療枠 の参照表（通し手術の判定で「今あるコマ」を見るため。Appが更新する）
var SLOTS_BY_DOW={};
// 実労働時間の計算：拘束時間（最早出勤〜退勤）から、6時間以上なら休憩1時間を引く
// ・複数コマの重複は通し時間で計算（二重計上しない）
// ・「○時まで」の退勤時刻で終わりを打ち切る
function daySpanHours(ranges, leaveLimitMin){
  if(!ranges.length)return 0;
  let start=Math.min.apply(null,ranges.map(r=>r.s));
  let end=Math.max.apply(null,ranges.map(r=>r.e));
  if(leaveLimitMin!=null) end=Math.min(end, Math.max(start, leaveLimitMin));
  let span=end-start;
  if(span<=0)return 0;
  if(span>360) span-=60; // 6時間を「超える」勤務は休憩1時間（6時間ちょうどは休憩なし）
  return span/60;
}
function dayHours(dk,staffId,asgn,excl,slotsState,staffArr){
  const d=new Date(dk),dow=d.getDay(),da=asgn[dk]||{};
  const src=slotsState||SLOTS;
  const ranges=[];
  Object.entries(da).forEach(([slotId,ids])=>{
    if(!ids.includes(staffId))return;
    if(excl&&(excl[dk]?.[slotId]||[]).includes(staffId))return;
    const slot=(src[dow]||[]).find(s=>s.id===slotId);
    const r=slot?slotRangeMin(slot):null;
    if(r&&r.s!=null&&r.e!=null)ranges.push(r);
  });
  const s=(staffArr?staffArr.find(x=>x.id===staffId):null)||STAFF_OBJ_LOOKUP[staffId]||null;
  // 通し手術(午前手術＋午後手術)は6時間勤務＝15:30退勤として扱う。
  // 固定IDではなく「その曜日に現在ある手術コマ」を時間帯で判定（古い割当に引っ張られない）。
  var lv=staffEndMin(s,dow);
  var hasAm=false,hasPm=false;
  (src[dow]||[]).forEach(function(sl){
    if(!sl||sl.type!=='surg')return;
    if(!(da[sl.id]||[]).includes(staffId))return;
    if(excl&&(excl[dk]?.[sl.id]||[]).includes(staffId))return;
    var r=slotRangeMin(sl); if(!r||r.s==null)return;
    if(r.s<12*60)hasAm=true; else hasPm=true;
  });
  if(hasAm&&hasPm){
    var cap=15*60+30; lv=(lv==null)?cap:Math.min(lv,cap);
  }
  return daySpanHours(ranges, lv);
}
function weekHours(staffId,weekDates,asgn,excl,slotsState,staffArr){
  return weekDates.reduce((s,d)=>s+dayHours(tdk(d),staffId,asgn,excl,slotsState,staffArr),0);
}
function monthHours(staffId,dates,asgn,excl,slotsState,staffArr){
  return dates.reduce((s,d)=>s+dayHours(tdk(d),staffId,asgn,excl,slotsState,staffArr),0);
}

  const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers,body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:16000,messages:[{role:'user',content:prompt}]})});
  const data=await r.json();
  if(r.status===401||r.status===403)throw new Error('AUTH_ERROR');
  if(!r.ok)throw new Error(data.error?.message||'APIエラー('+r.status+')');
  let raw=(data.content||[]).map(c=>c.type==='text'?c.text:'').join('').trim();
  raw=raw.replace(/```json|```/g,' ');
  // 前置き文があってもJSON本体だけを取り出す（最初の「{」から、括弧の対応で閉じる「}」まで。文字列内の{}や引用符は無視）
  const extractObj=(s)=>{
    const i=s.indexOf('{'); if(i<0)return null;
    let depth=0,inStr=false,esc=false;
    for(let j=i;j<s.length;j++){
      const ch=s[j];
      if(inStr){ if(esc)esc=false; else if(ch==='\\')esc=true; else if(ch==='"')inStr=false; }
      else if(ch==='"')inStr=true;
      else if(ch==='{')depth++;
      else if(ch==='}'){ if(--depth===0)return s.slice(i,j+1); }
    }
    return s.slice(i); // 閉じ切らない（応答が途中で切れた）場合は最初の「{」以降を返す
  };
  const body=extractObj(raw)||raw;
  try{return JSON.parse(body);}
  catch(e){
    // 途中で切れた場合の簡易修復
    const clean=body.trim();
    const fixed=clean.endsWith('}}')?clean:clean.replace(/,?\s*\{[^}]*$|,?\s*"[^"]*$|,?\s*\[.*$/,'');
    try{return JSON.parse(fixed+'}]}');}
    catch(e2){throw new Error('レスポンスのJSON解析に失敗しました。再度お試しください。（detail: '+clean.slice(0,120)+'...）');}
  }
}

function normalizeSurgeryFlags(raw){
  const src=(raw&&raw.surgeryFlags)||raw?.data||raw?.flags||raw||{};
  const out={};
  Object.entries(src||{}).forEach(([dk,v])=>{
    if(!v||typeof v!=='object')return;
    out[dk]={am:!!(v.am||v.am_surg||v.morning),pm:!!(v.pm||v.pm_surg||v.afternoon)};
  });
  return out;
}
function surgeryPeriodForSlot(slot){

}
function surgeryMarkForSlot(flags,dk,slot){

// ── 外来休診（診察室ごとの開閉）──
// 医師画面で登録し、同一クリニック内のドクター/ナース/クラークで共有する。
// 形: { "YYYY-MM-DD": { "am_out": { "1": false, "2": true } } }
// true=休診(ー), false/未設定=診察(○)
const CLINIC_ROOM_NUMS=['','⑴','⑵'];
const CLINIC_ROOM_LABELS=['','１診','２診'];
function isOutpatientSlot(slot){
  const label=(slot&&slot.label||'').toString();
  return !!slot && slot.type==='out' && label.indexOf('外来')>=0;
}
// v131: 診察室数は「必要スタッフ数」ではなく外来枠の種類で決める。
// これまで getReq() を診察室数として使っていたため、休診日の午前外来に「３診」が出ることがあった。
// 原則、午前外来・夜外来は2診、昼外来は1診として扱う。
function outpatientRoomCountForSlot(slot){
  const label=(slot&&slot.label||'').toString();
  if(label.indexOf('昼外来')>=0)return 1;
  return 2;
}
function outpatientRoomClosed(closures,dk,slotId,roomIdx,dayClosed){
  const sl=closures&&closures[dk]&&closures[dk][slotId];
  if(sl&&Object.prototype.hasOwnProperty.call(sl,String(roomIdx)))return !!sl[String(roomIdx)];
  // v132: 祝日・休診日はデフォルト休診。ただし個別に false を保存すれば診察ありに戻せる。
  if(dayClosed)return true;
  return false;
}
function outpatientMarkForSlot(closures,dk,slot,req,dayClosed=false,mode='compact'){
  if(!isOutpatientSlot(slot))return '';
  const n=outpatientRoomCountForSlot(slot);
  const parts=[];
  for(let i=1;i<=n;i++){
    const mark=outpatientRoomClosed(closures,dk,slot.id,i,dayClosed)?'ー':'○';
    parts.push(mode==='detail'?(CLINIC_ROOM_LABELS[i]+'：'+mark):(CLINIC_ROOM_NUMS[i]+mark));
  }
  return mode==='detail'?parts.join('　'):parts.join('');
}
function hasOutpatientClosureForSlot(closures,dk,slot,dayClosed=false){
  if(dayClosed&&isOutpatientSlot(slot))return true;
  const c=(closures&&closures[dk]&&closures[dk][slot.id])||{};
  return Object.entries(c).some(([idx,v])=>v && Number(idx)<=outpatientRoomCountForSlot(slot));
}

function appendParam(url,k,v){
  const sep=url.indexOf('?')>=0?'&':'?';
  return url+sep+encodeURIComponent(k)+'='+encodeURIComponent(v);
}
async function fetchJsonp(url,timeoutMs){
  return new Promise((resolve,reject)=>{
    const cb='__fukumimi_surgery_cb_'+Date.now()+'_'+Math.floor(Math.random()*1000000);
    let done=false; const cleanup=()=>{try{delete window[cb];}catch(e){};try{script.remove();}catch(e){}};
    const script=document.createElement('script');
    const timer=setTimeout(()=>{if(done)return;done=true;cleanup();reject(new Error('timeout'));},timeoutMs||12000);
    window[cb]=(data)=>{if(done)return;done=true;clearTimeout(timer);cleanup();resolve(data);};
    script.onerror=()=>{if(done)return;done=true;clearTimeout(timer);cleanup();reject(new Error('jsonp error'));};
    script.src=appendParam(url,'callback',cb);
    document.head.appendChild(script);
  });
}
async function fetchSurgeryFlagsFromUrl(baseUrl,y,m){
  let url=(baseUrl||'').trim(); if(!url)throw new Error('URL未設定');
  // v117: Apps Script側のサンプルは year/month を読むため、正式パラメータを year/month に統一。
  // 旧互換として y/m も併送する（既存の別スクリプトが y/m を読んでいても壊さない）。
  url=appendParam(url,'year',y); url=appendParam(url,'month',m);

  if(APP_CLINIC)url=appendParam(url,'clinic',APP_CLINIC);
  if(APP_UNIT)url=appendParam(url,'unit',APP_UNIT);
  url=appendParam(url,'_ts',Date.now());
  try{
    const r=await fetch(url,{cache:'no-store'});
    if(!r.ok)throw new Error('HTTP '+r.status);
    const data=await r.json();
    return normalizeSurgeryFlags(data);
  }catch(e){
    const data=await fetchJsonp(url,12000);
    return normalizeSurgeryFlags(data);
  }
}
// 1スタッフ分の未読を集計。seen=既読マップ(ck->at)。returns {count, byReq:{ck:件数}, latest:{ck:maxAt}}
function calcUnreadReplies(requests,sid,seen){
  sid=String(sid); seen=seen||{};
  let count=0; const byReq={}, latest={};
  Object.entries(requests||{}).forEach(([dk,dayMap])=>{
    Object.entries(dayMap||{}).forEach(([k,r])=>{
      if(!r)return;
      const mine=String(k)===sid||(r.type==='mistake_report'&&String(r.staffId)===sid);
      if(!mine)return;
      const reps=(r.replies||[]).filter(rp=>rp&&(rp.from==='admin'||rp.from==='system'));
      if(!reps.length)return;
      const ck=dk+'|'+k;
      const maxAt=reps.reduce((m,rp)=>String(rp.at||'')>m?String(rp.at||''):m,'');
      latest[ck]=maxAt;
      const seenAt=String(seen[ck]||'');
      const n=reps.filter(rp=>String(rp.at||'')>seenAt).length;
      if(n>0){count+=n;byReq[ck]=n;}
    });
  });
  return {count,byReq,latest};
}
// requestsのマージ保存用：他端末が追加した申請・メッセージを消さずに統合する。
// localを基準に、cloudにしか無いキー（他端末の追加）を取り込む。ただし最近ローカルで削除したキー(tomb)は復活させない。
function mergeRequests(local,cloud,tomb){
  local=local||{}; cloud=cloud||{}; tomb=tomb||{};
  const out={}; const now=Date.now();
  for(const dk in local){ out[dk]={...local[dk]}; }
  for(const dk in cloud){
    for(const k in cloud[dk]){
      if(out[dk]&&Object.prototype.hasOwnProperty.call(out[dk],k))continue; // localにある→local優先
      if(tomb[dk+'|'+k]&&tomb[dk+'|'+k]>now)continue;                       // 最近ローカルで削除→復活させない
      if(!out[dk])out[dk]={};
      out[dk][k]=cloud[dk][k];
    }
  }
  for(const dk in out){ if(Object.keys(out[dk]).length===0)delete out[dk]; }
  return out;
}

// ── requests_data の「包み(wrapper)」ユーティリティ ──
// requests_data の各職種の値を {requests(日付マップ), avatars(codeごと), timecardCorrections(配列)} にまとめる。
// 旧形式（値が日付マップそのもの）も読めるよう後方互換。
function unwrapReq(d){
  if(!d||typeof d!=='object')return {requests:{},avatars:{},corrections:[]};
  const wrapped=('requests'in d)||('avatars'in d)||('timecardCorrections'in d);
  if(wrapped)return {
    requests:(d.requests&&typeof d.requests==='object')?d.requests:{},
    avatars:(d.avatars&&typeof d.avatars==='object')?d.avatars:{},
    corrections:Array.isArray(d.timecardCorrections)?d.timecardCorrections:[]
  };
  return {requests:d,avatars:{},corrections:[]}; // 旧：全体が日付マップ
}
function wrapReq(requests,avatars,corrections){
  return {requests:requests||{},avatars:avatars||{},timecardCorrections:corrections||[]};
}
// avatars: 自分のkeyはlocal優先、それ以外はcloudを残す
function mergeAvatars(local,cloud){ return {...(cloud||{}),...(local||{})}; }
// corrections: cloudを基準（タイムカードが更新したstatusを保つ）に、localの新規だけ追加
function corrKey(c){ return String(c.code)+'|'+String(c.date)+'|'+String(c.appliedAt||''); }
function mergeCorrections(local,cloud){
  const out=[...(Array.isArray(cloud)?cloud:[])]; const seen={};
  out.forEach(c=>{seen[corrKey(c)]=1;});
  (Array.isArray(local)?local:[]).forEach(c=>{const k=corrKey(c);if(!seen[k]){seen[k]=1;out.push(c);}});
  return out;
}

function calcRemaining(granted, history){

}

function calcUsedDaysFromRequests(requests,staffId){
  let used=0;
  Object.values(requests||{}).forEach(dayMap=>{
    const req=dayMap[staffId];if(!req)return;
    if(req.type==='paid_full')used+=1;
    else if(req.type==='paid_am'||req.type==='paid_pm')used+=0.5;
  });
  return used;
}

              if(ndt[d].s&&ndt[d].e){[1,2,3,4,5,6].forEach(d2=>{if(d2===d)return;if(days[d2]===false)return;const t2=ndt[d2]||{s:'',e:''};if(!t2.s&&!t2.e)ndt[d2]={s:ndt[d].s,e:ndt[d].e};});}
              onCond(Object.assign({},c,{dayTimes:ndt}));
            };
            return(
              <div key={d} style={{display:'flex',alignItems:'center',gap:8}}>

                  <div style={{display:'flex',alignItems:'center',gap:5,fontSize:12,color:'#475569'}}>

                    <span>〜</span>
                    <input type="time" value={dt.e||''} onChange={e=>setDayTime('e',e.target.value)} style={Object.assign({},inp,{padding:'4px 6px'})}/>

                ):<span style={{fontSize:12,color:'#94A3B8'}}>勤務しない</span>}
              </div>
            );
          })}
        </div>
        <div style={{fontSize:10,color:'#94A3B8',marginTop:4}}>※ どこか1日に時刻を入れると、空いている他の曜日も自動で同じ時刻になります。違う曜日だけ直してください。時刻を空にすると制限なし。</div>
      </div>
      <div><label style={lbl}>週の労働時間</label>
        <div style={{display:'flex',alignItems:'center',gap:6,fontSize:13,color:'#475569'}}>
          <input type="number" min="0" value={c.weekMinH} onChange={e=>set('weekMinH',e.target.value?Number(e.target.value):'')} placeholder="下限" style={Object.assign({width:60},inp)}/> 時間以上
          <input type="number" min="0" value={c.weekMaxH} onChange={e=>set('weekMaxH',e.target.value?Number(e.target.value):'')} placeholder="上限" style={Object.assign({width:60},inp)}/> 時間以内
        </div>
        <div style={{fontSize:10,color:'#94A3B8',marginTop:2}}>空欄なら制限なし</div>
      </div>
      <div><label style={lbl}>担当できるコマ</label><div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
        {[['both','外来・手術 両方'],['out','外来のみ'],['surg','手術のみ']].map(([v,t])=>(<button key={v} onClick={()=>set('slot',v)} style={chip((c.slot||'both')===v)}>{t}</button>))}
      </div></div>
      <div><label style={lbl}>自由メモ（隔週・月◯回などの特記。AIが参考にします）</label>
        <textarea value={memo||''} onChange={e=>onMemo(e.target.value)} rows={2} placeholder="例：土曜は隔週（B週）のみ／土は月1〜2回 など" style={{width:'100%',padding:'6px 9px',border:'1px solid #CBD5E1',borderRadius:6,fontSize:12,boxSizing:'border-box',lineHeight:1.5,background:'#fff',color:'#1E293B'}}/></div>
      {/* ベースシフト固定：隔週・午前のみ等の複雑な条件は自動配置が理解できないため、この人は基本シフト通りにだけ置く */}
      <div style={{marginTop:4,padding:'8px 10px',background:c.baseOnly?'#FEF3C7':'#F8FAFC',border:'1px solid '+(c.baseOnly?'#FCD34D':'#E2E8F0'),borderRadius:8}}>
        <label style={{display:'flex',alignItems:'flex-start',gap:8,cursor:'pointer'}}>
          <input type="checkbox" checked={!!c.baseOnly} onChange={e=>set('baseOnly',e.target.checked)} style={{marginTop:2,width:16,height:16,flexShrink:0}}/>
          <span style={{fontSize:12,lineHeight:1.5,color:'#1E293B'}}><b>ベースシフト通りに固定する</b>（自動シフト作成・配置を自動調整で、この人を勝手に追加・移動しない）<br/><span style={{fontSize:11,color:'#64748B'}}>「土曜は奇数週の午前だけ」など複雑な条件の人に。ベースシフト（A週/B週）で設定した通りにだけ配置されます。</span></span>
        </label>
      </div>
    </div>
  );
}

// ================================================================
function App(){
  const saved=useMemo(()=>loadLS(),[]);
  // 「手元の最新の作成日時」を常に保持するref。クラウド読込の競合判定で、起動時固定の saved ではなくこれを使う（未公開の編集が消える不具合の対策）。
  const shiftTsRef=React.useRef(saved?.shiftUpdatedAt||'');
  // ── アプリモード ──
  // 更新リロード後にログイン中の画面を復元（sessionStorageに直前のセッションがあれば使う）
  const [appMode,setAppMode]=useState(()=>{const r=loadResume();return (r&&r.appMode==='staff'&&r.staffMyId!=null)?'staff':'select';}); // 'select'|'admin'|'staff'
  const [sbLoading,setSbLoading]=useState(false);
  const [sbStatus,setSbStatus]=useState(''); // ''|'ok'|'error'
  // 使用中に新しい版が公開されたら通知（入力中に勝手にリロードしないよう、バナーでタップ更新を促す）
  const [updateVer,setUpdateVer]=useState('');
  useEffect(()=>{
    let stop=false,last=0;
    const check=async()=>{
      const now=Date.now(); if(now-last<30000)return; last=now; // 30秒以内の重複確認はスキップ
      const latest=await fetchLatestAppVersion();
      if(!stop&&latest&&latest!==APP_VERSION)setUpdateVer(latest);
    };
    const id=setInterval(check,120000); // 2分ごとに最新版を確認
    const t=setTimeout(check,15000);    // 初回は起動15秒後にも確認
    // ホーム画面アプリ（スタンドアロン）はバックグラウンド復帰が多く再読込されないため、復帰時にも確認
    const onVis=()=>{if(document.visibilityState==='visible')check();};
    document.addEventListener('visibilitychange',onVis);
    window.addEventListener('pageshow',check);
    window.addEventListener('focus',check);
    return()=>{stop=true;clearInterval(id);clearTimeout(t);document.removeEventListener('visibilitychange',onVis);window.removeEventListener('pageshow',check);window.removeEventListener('focus',check);};
  },[]);
  // クラウド読み込みが成功するまで自動保存を止める安全装置（古いデータでクラウドを上書きしないため）
  const sbReadyRef=React.useRef(false);
  // ── 合言葉ログイン ──
  const [authStatus,setAuthStatus]=useState(()=>SB_ENABLED?'checking':'authed'); // 'checking'|'need'|'authed'
  const [authPassInput,setAuthPassInput]=useState('');
  const [authErr,setAuthErr]=useState('');
  const [authBusy,setAuthBusy]=useState(false);
  React.useEffect(()=>{
    if(!SB_ENABLED){setAuthStatus('authed');return;}
    (async()=>{
      let p='';try{p=localStorage.getItem(PASS_KEY)||'';}catch(e){}
      if(p){const r=await SB.signIn(p);setAuthStatus(r.ok?'authed':'need');}
      else setAuthStatus('need');
    })();
  // eslint-disable-next-line
  },[]);
  async function submitPassphrase(){
    if(!authPassInput.trim())return;
    setAuthBusy(true);setAuthErr('');
    const r=await SB.signIn(authPassInput.trim());
    if(r.ok){try{localStorage.setItem(PASS_KEY,authPassInput.trim());}catch(e){}setAuthStatus('authed');setAuthPassInput('');}
    else setAuthErr(r.error||'合言葉が違うか、まだ設定が完了していません。');

  // Supabaseからデータ読み込み（管理者モード起動時）
  React.useEffect(()=>{
    if(appMode!=='admin'||!SB_ENABLED)return;
    setSbLoading(true);
    (async()=>{
      try{
        const [sdR,rdR,draftR]=await Promise.all([SB.getSafe('shift_data'),SB.getSafe('requests_data'),SB.getShiftDraftSafe()]);
        if(!sdR.ok){
          // クラウドに到達できなかった → 自動保存は有効化しない（古いローカルでクラウドを上書きしないため）
          setSbStatus('error');setSbLoading(false);return;

        const sd=sdR.data, rd=rdR.data;

        if(sd&&Object.prototype.hasOwnProperty.call(sd,'surgeryCalUrl')){

        // 競合ガード：手元(localStorage)の方が新しい未公開の編集があれば、クラウドの古い版で上書きしない
        // ※ 起動時固定の saved ではなく、編集で更新される shiftTsRef を基準にする（未公開編集の消失対策）
        const localTs=shiftTsRef.current||saved?.shiftUpdatedAt||'';
        const cloudTs=(sd&&sd.shiftUpdatedAt)||'';
        // 端末側に実シフト（配置asgn）が無い＝守るべき未公開編集が無い場合は、必ずクラウドを採用する。
        // 新クリニックを移行前に一度開いた端末で、空データがクラウドより新しく見えて読み込まれない問題への対策。
        const localHasShift=!!(saved&&saved.asgn&&Object.keys(saved.asgn).length>0);

        // クリニックモードの共通(shared)＝診療枠・休診日・採番は全職種で同一。

        if(sd&&Array.isArray(sd.history))setShiftHistory(sd.history);
        if(sd&&Object.keys(sd).length>0 && cloudWins){
          if(sd.staff)setStaff(sd.staff);
          if(sd.slots)setSlots(sd.slots);
          if(sd.asgn)setAsgn(sd.asgn);
          if(sd.tmps)setTmps(sd.tmps);
          if(sd.weeklyReq)setWeeklyReq(sd.weeklyReq);
          if(sd.monthlyReq)setMonthlyReq(sd.monthlyReq);
          if(sd.manualExclusions)setManualExclusions(sd.manualExclusions);
          if(sd.manualClosedDays)setManualClosedDays(sd.manualClosedDays);
          if(sd.outpatientClosures&&typeof sd.outpatientClosures==='object')setOutpatientClosures(sd.outpatientClosures);
          if(sd.outpatientClosuresUpdatedAt!==undefined)setOutpatientClosuresUpdatedAt(sd.outpatientClosuresUpdatedAt||'');

          if(sd.lockedMonths&&typeof sd.lockedMonths==='object')setLockedMonths(sd.lockedMonths);
          shiftStampLoadRef.current=true; // 読込では作成日時を更新しない

          if(sd.y)setY(sd.y);if(sd.m)setM(sd.m);

        if(draftR&&draftR.ok&&draftR.data&&draftR.data.draftSavedAt)setDraftSavedAt(draftR.data.draftSavedAt);
        // 手元が新しい場合は、その手元の版を「未公開」として扱う（クラウドより新しい）

        sbReadyRef.current=true; // クラウド読み込み成功 → これ以降のみ自動保存を許可

  async function publishToCloud(){

    setPublishing(true);
    try{
      // 競合チェック：クラウドにこれより新しい版があれば確認

      if(!cloud.ok){alert('クラウドに接続できませんでした。通信状況をご確認ください。');setPublishing(false);return;}
      const prev=cloud.data;
      const cloudTs=(prev&&prev.shiftUpdatedAt)||'';
      if(cloudTs && shiftUpdatedAt && cloudTs>shiftUpdatedAt){
        if(!window.confirm('クラウドには、これより新しいシフト（'+fmtStamp(cloudTs)+'）が保存されています。\n他の端末で更新された可能性があります。上書きして公開しますか？')){setPublishing(false);return;}
      }
      // 直前の公開版を履歴に自動退避し、今回公開した版も「公開時点スナップショット」として保存する。
      // これにより、公開後に編集しても、公開時点の正本は履歴内で変化しない。
      let hist=(prev&&Array.isArray(prev.history))?prev.history:[];
      const archiveAt=new Date().toISOString();
      const currentArchive=makeHistorySnapshot('published_archive','公開時点スナップショット',currentShiftPayload(),{publishedAt:archiveAt,archiveName:publishArchiveName(archiveAt)});
      const additions=[currentArchive];
      if(prev&&Object.keys(prev).length>0){
        const prevNoHist=Object.assign({},prev); delete prevNoHist.history;
        additions.push({at:new Date().toISOString(),made:prev.shiftUpdatedAt||'',kind:'auto_publish',label:'公開前バックアップ',data:prevNoHist});
      }
      hist=pruneShiftHistory([...additions,...hist]);
      const data=currentShiftPayload({history:hist});
      const ok=await SB.set('shift_data',data);
      if(ok){setPublishedAt(shiftUpdatedAt);setShiftHistory(hist);alert('スタッフへ公開しました。\n（作成: '+fmtStamp(shiftUpdatedAt)+'）\n公開時点スナップショットを保存しました。\n保存名: '+currentArchive.archiveName);}
      else alert('保存に失敗しました。もう一度お試しください。');

  }

  function importStaffRequests(e){
    const file=e.target.files?.[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const d=JSON.parse(ev.target.result);
        if(d.type!=='staff_requests')throw new Error('スタッフ申請ファイルではありません');
        const sid=d.staffId;
        const sname=d.staffName||'不明';
        const reqs=d.requests||{};
        const reqList=Object.entries(reqs);
        if(reqList.length===0){alert(sname+'さんの申請データは空です。');return;}

        // 申請内容をtmpsとpaidLeaveに反映
        let appliedCount=0;
        const typeToTmpType={paid_full:'paid',paid_am:'paid_am',paid_pm:'paid_pm',off:'off'};
        const typeToUnit={paid_full:'full',paid_am:'am',paid_pm:'pm'};

        const newTmps={...tmps};
        const newPL={...paidLeave};

        reqList.forEach(([dk,req])=>{
          const ttype=typeToTmpType[req.type];
          if(!ttype)return;
          // tmpsに追加
          newTmps[dk]={...(newTmps[dk]||{})};
          newTmps[dk][sid]={type:ttype,note:'',unit:typeToUnit[req.type]||''};
          // 有給の場合はpaidLeave履歴にも追加
          if(req.type==='paid_full'||req.type==='paid_am'||req.type==='paid_pm'){
            const cur=newPL[sid]||{granted:0,history:[]};
            const filtered=(cur.history||[]).filter(r=>r.dk!==dk);
            const entry={dk,unit:typeToUnit[req.type],appliedAt:req.appliedAt||new Date().toISOString()};
            newPL[sid]={...cur,history:[...filtered,entry]};
          }
          appliedCount++;
        });
        setTmps(newTmps);
        setPaidLeave(newPL);
        alert('✓ '+sname+'さんの申請を'+appliedCount+'件取り込みました。\nシフト表と有給残日数に反映されています。');
      }catch(err){alert('取り込みに失敗しました：'+err.message);}
    };
    reader.readAsText(file);e.target.value='';
  }

  // ── データ読み込み ──
  function loadData(e){
    const file=e.target.files?.[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const d=JSON.parse(ev.target.result);
        if(d.staff)setStaff(d.staff);
        if(d.slots)setSlots(d.slots);
        if(d.weeklyReq)setWeeklyReq(d.weeklyReq);
        if(d.monthlyReq)setMonthlyReq(d.monthlyReq);
        if(d.asgn)setAsgn(d.asgn);
        if(d.tmps)setTmps(d.tmps);
        if(d.manualExclusions)setManualExclusions(d.manualExclusions);
        if(d.manualClosedDays)setManualClosedDays(d.manualClosedDays);
        if(d.outpatientClosures&&typeof d.outpatientClosures==='object')setOutpatientClosures(d.outpatientClosures);
        if(d.outpatientClosuresUpdatedAt!==undefined)setOutpatientClosuresUpdatedAt(d.outpatientClosuresUpdatedAt||'');
        if(d.baseShift)setBaseShift(d.baseShift);
        // ── CL-2形式ベースシフトJSON（名前・ラベルベース）の変換取込 ──
        if(d.patterns&&!d.baseShift){
          const DOW_MAP={'月':1,'火':2,'水':3,'木':4,'金':5,'土':6};
          // 曜日ごとのラベル→slotId変換テーブル（slotsはグローバルのSLOTS定義を使用）
          const dowLabelToId={};
          Object.entries(SLOTS).forEach(([dow,sls])=>{
            dowLabelToId[dow]={};
            sls.forEach(sl=>{dowLabelToId[dow][sl.label]=sl.id;});
          });
          // スタッフ名→ID変換テーブル（現在のstaffから）
          const curStaff=d.staff||staff;
          const nameToId={};
          curStaff.forEach(s=>{nameToId[s.name]=s.id;});
          const converted={A:{},B:{}};
          Object.entries(d.patterns).forEach(([pat,patData])=>{
            if(!converted[pat])converted[pat]={};
            const shifts=patData.shifts||{};
            Object.entries(shifts).forEach(([dowJp,slotMap])=>{
              const dow=DOW_MAP[dowJp];if(!dow)return;
              const labelMap=dowLabelToId[dow]||{};
              if(!converted[pat][dow])converted[pat][dow]={};
              Object.entries(slotMap).forEach(([label,names])=>{
                const slotId=labelMap[label];if(!slotId)return;
                const ids=(names||[]).map(n=>nameToId[n]).filter(id=>id!==undefined);
                if(ids.length>0)converted[pat][dow][slotId]=ids;
              });
            });
          });
          setBaseShift(converted);
          alert('ベースシフトを読み込みました（CL-2形式）\nAパターン・Bパターンをベースシフトタブで確認してください。');
        }
        if(d.y)setY(d.y);if(d.m)setM(d.m);
        if(d.newSlotCounter)setNewSlotCounter(d.newSlotCounter);
        if(d.paidLeave)setPaidLeave(d.paidLeave);
        alert('データを読み込みました（保存日時: '+new Date(d.savedAt).toLocaleString('ja-JP')+'）');
      }catch(err){alert('読み込みに失敗しました。正しいJSONファイルか確認してください。');}
    };
    reader.readAsText(file);e.target.value='';
  }

  function exportStaffPDF(){
    const printWin=window.open('','_blank','width=1200,height=900');

    const mondayIdxs=allDates.map((d,i)=>d.getDay()===1?i:-1).filter(i=>i>0);
    const thHtml=allDates.map((d,di)=>{
      const dow=d.getDay(),isSat=dow===6,isWS=mondayIdxs.includes(di);
      return `<th class="${isSat?'sat-h':''}${isWS?' week-sep':''}">${d.getDate()}<br><span style="font-size:6pt;font-weight:400">${DAY_JP[dow]}</span></th>`;
    }).join('');
    const rowsHtml=staff.map(s=>{
      const cells=allDates.map((d,di)=>{
        const dk=tdk(d),dow=d.getDay(),da=asgn[dk]||{},dExcl=manualExclusions[dk]||{},dt=tmps[dk]||{};
        const isSat=dow===6,isWS=mondayIdxs.includes(di),ec=(isSat?'sat-c':'')+(isWS?' week-sep':'');
        if(['off','paid','paid_am','paid_pm'].includes(dt[s.id]?.type||dt[String(s.id)]?.type)){const lbl=(dt[String(s.id)]||dt[s.id])?.type==='paid'?'有給':dt[s.id]?.type==='paid_am'?'有(午前)':dt[s.id]?.type==='paid_pm'?'有(午後)':'休';return `<td class="cell-off${isSat?' sat-c':''}${isWS?' week-sep':''}"><span class="off-mark">${lbl}</span></td>`;}
        const assigned=(slots[dow]||[]).filter(slot=>{
          const ids=(da[slot.id]||[]).filter(sid=>!(dExcl[slot.id]||[]).includes(sid));
          return ids.includes(s.id);
        });
        if(assigned.length===0)return `<td class="${ec}"></td>`;
        // 出退勤時刻を計算（コマのtime文字列から最早開始・最遅終了）
        // 全角コロン・全角ハイフン・波ダッシュに対応した堅牢版
        const normalizeTime=t=>(t||'').replace(/[\uff01-\uff5e]/g,ch=>String.fromCharCode(ch.charCodeAt(0)-0xFEE0)).replace(/[\u30fc\u2013\u2014\u301c\uff0d]/g,'-');
        const parseTime=t=>{const nt=normalizeTime(t);const m=nt.match(/(\d{1,2}):(\d{2})/);return m?parseInt(m[1])*60+parseInt(m[2]):-1;};
        const splitTime=t=>{const nt=normalizeTime(t);const idx=nt.indexOf('-');return idx>0?[nt.slice(0,idx),nt.slice(idx+1)]:null;};
        let minStart=9999,maxEnd=-1;
        assigned.forEach(slot=>{
          const parts=splitTime(slot.time||'');
          if(parts){
            const s=parseTime(parts[0]),e=parseTime(parts[1]);
            if(s>=0&&s<minStart)minStart=s;
            if(e>=0&&e>maxEnd)maxEnd=e;
          }
        });
        const fmtT=m=>m>=0&&m<9999?Math.floor(m/60)+':'+(m%60).toString().padStart(2,'0'):'';
        const startStr=fmtT(minStart),endStr=fmtT(maxEnd);
        // スタッフのnotes から勤務終了時刻制限を抽出
        const notes=s.notes||'';
        const em=notes.match(/(\d{1,2})(?::(\d{2}))?時?まで(?![\s\S]*(?:以降|から|より))/);
        const limitMin=em?parseInt(em[1])*60+(em[2]?parseInt(em[2]):0):null;
        const fmtLimit=limitMin!=null?Math.floor(limitMin/60)+':'+(limitMin%60).toString().padStart(2,'0'):null;
        // 退勤時刻が制限を超えている場合「実際の退勤(帰HH:MM)」を表示
        const endDisplay=maxEnd>=0&&fmtLimit&&maxEnd>limitMin
          ?`${endStr}<span class="limit-note">（帰${fmtLimit}）</span>`
          :endStr;
        const tags=assigned.map(slot=>`<span class="stag${slot.type==='surg'?' stag-s':''}">${slot.label}</span>`).join('');
        return `<td class="${ec}"><div class="time-row start">${startStr}</div><div class="tags">${tags}</div><div class="time-row end">${endDisplay}</div></td>`;
      }).join('');
      const totalH=monthHours(s.id,allDates,asgn,manualExclusions,slots);
      return `<tr><td class="name-cell"><span class="sname-row">${s.name}</span><span class="s-stat">${mcnt[s.id]||0}コマ / ${totalH.toFixed(1)}h</span></td>${cells}</tr>`;
    }).join('');
    const scale=allDates.length>=25?0.70:allDates.length>=22?0.80:0.92;
    printWin.document.write(`<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><title>個人別シフト表 ${y}年${m}月</title><style>

  // ── 達成レポート生成（機械チェック） ──
  function generateReport(){
    return staff.map(s=>{
      const wh=parseWeeklyHours(s.notes);
      const emp=parseEmploymentType(s.notes);
      const ok=[];
      const ng=[];

      try{
        // 月間総時間とコマ数
        const totalH=monthHours(s.id,dates,asgn,manualExclusions,slots);
        const totalSlots=dates.reduce((sum,d)=>{
          const dk=tdk(d),dayAsgn=asgn[dk]||{},dayExcl=manualExclusions[dk]||{};
          return sum+Object.entries(dayAsgn).reduce((s2,[slotId,ids])=>
            s2+((ids||[]).filter(sid=>sid===s.id&&!(dayExcl[slotId]||[]).includes(sid)).length),0);
        },0);

        // 週間時間制約チェック
        if(wh&&(wh.min>0||wh.max<40)){
          const condDesc='週'+(wh.min>0?wh.min+'h以上':'')+(wh.min>0&&wh.max<40?'〜':'')+(wh.max<40?wh.max+'h以内':'');
          const violations=[];
          weeks.forEach((wk,wi)=>{
            if(wk.length<3) return; // 月初・月末の極端に短い週はスキップ
            const h=weekHours(s.id,wk,asgn,manualExclusions,slots);
            const hasWork=wk.some(d=>{
              const dk=tdk(d),dayAsgn=asgn[dk]||{};
              return Object.entries(dayAsgn).some(([slotId,ids])=>
                (ids||[]).includes(s.id)&&!(manualExclusions[dk]?.[slotId]||[]).includes(s.id));
            });
            if(!hasWork) return;
            // その週の診療日数(月〜土・休診除く)。フル週=6日。短い週は6日換算の補正時間で最低時間を判定。
            const cd=wk.filter(d=>(slots[d.getDay()]||[]).length>0&&!isClosedDay(tdk(d))).length;
            const corr=(cd>0&&cd<6)?h*6/cd:h;
            const shortWk=cd>0&&cd<6;
            if(wh.min>0&&corr<wh.min) violations.push('第'+(wi+1)+'週: 実働'+h.toFixed(1)+'h'+(shortWk?'（補正'+corr.toFixed(1)+'h）':'')+'（最低'+wh.min+'h未達）');
            if(wh.max<40&&h>wh.max) violations.push('第'+(wi+1)+'週: 実働'+h.toFixed(1)+'h（上限'+wh.max+'h超過）');
          });
          if(violations.length===0) ok.push(condDesc+'：すべての週で達成（短い週は6日換算で判定）');
          else ng.push({cond:condDesc, detail:violations.join('\n')});
        }

        // 月間実績は必ず表示
        const empLabel=emp==='fulltime'?'常勤':emp==='parttime'?'パート':'スタッフ';
        ok.push((empLabel?empLabel+'として':'')+'月間 '+totalH.toFixed(1)+'h / '+totalSlots+'コマ 勤務');

        // 週コマ数制約チェック（「週1〜2コマ」「週3コマ以内」など）
        const notesN=(s.notes||'').replace(/[０-９]/g,c=>String.fromCharCode(c.charCodeAt(0)-0xFEE0));
        const slotCntMatch=notesN.match(/週\s*(\d+)\s*[〜~～]\s*(\d+)\s*コマ/) ||
                           notesN.match(/週\s*(\d+)\s*コマ以内/) ||
                           notesN.match(/週\s*(\d+)\s*コマ(?:のみ)?/);
        if(slotCntMatch){
          let minSlots=0,maxSlots=99;
          if(slotCntMatch[0].includes('〜')||slotCntMatch[0].includes('~')||slotCntMatch[0].includes('～')){
            minSlots=parseInt(slotCntMatch[1]);maxSlots=parseInt(slotCntMatch[2]);
          } else if(slotCntMatch[0].includes('以内')){
            maxSlots=parseInt(slotCntMatch[1]);
          } else {
            minSlots=parseInt(slotCntMatch[1]);maxSlots=parseInt(slotCntMatch[1]);
          }
          const slotViol=[];
          weeks.forEach((wk,wi)=>{
            if(wk.length<3) return;
            const wkSlots=wk.reduce((sum,d)=>{
              const dk=tdk(d),dayAsgn=asgn[dk]||{},dayExcl=manualExclusions[dk]||{};
              return sum+Object.entries(dayAsgn).reduce((s2,[slotId,ids])=>
                s2+((ids||[]).filter(sid=>sid===s.id&&!(dayExcl[slotId]||[]).includes(sid)).length),0);
            },0);
            if(wkSlots===0) return;
            if(wkSlots<minSlots) slotViol.push('第'+(wi+1)+'週: '+wkSlots+'コマ（'+minSlots+'コマ以上必要）');
            if(wkSlots>maxSlots) slotViol.push('第'+(wi+1)+'週: '+wkSlots+'コマ（上限'+maxSlots+'コマ超過）');
          });
          const condDescS='週'+slotCntMatch[0].replace('週','').trim();
          if(slotViol.length===0) ok.push(condDescS+'：すべての週で達成');
          else ng.push({cond:condDescS, detail:slotViol.join('\n')});
        }

        // 週間時間制約チェック（3日未満の短い週はスキップ）
        const onlySurg=/手術.*のみ|手術コマのみ|手術専門|手術専属/.test(s.notes||'');
        if(onlySurg){
          const viol=[];
          dates.forEach(d=>{
            const dk=tdk(d),dayAsgn=asgn[dk]||{},dayExcl=manualExclusions[dk]||{};
            (slots[d.getDay()]||[]).forEach(slot=>{
              if(slot.type==='surg') return;
              const ids=(dayAsgn[slot.id]||[]).filter(sid=>!(dayExcl[slot.id]||[]).includes(sid));
              if(!ids.includes(s.id)) return;
              // 代替候補
              const cands=staff.filter(o=>{
                if(o.id===s.id) return false;
                if((dayAsgn[slot.id]||[]).includes(o.id)) return false;
                const dh2=dayHours(dk,o.id,asgn,manualExclusions,slots);
                const sh2=slotHours(d.getDay(),slot.id,slots);
                return dh2+sh2<=DAILY_LIMIT;
              }).slice(0,3).map(o=>o.name).join('・');
              viol.push((d.getMonth()+1)+'/'+d.getDate()+'('+DAY_JP[d.getDay()]+') '+slot.label+(cands?' → 代替候補: '+cands:''));
            });
          });
          if(viol.length===0) ok.push('手術コマのみ担当：達成');
          else ng.push({cond:'手術コマのみ担当', detail:viol.join('\n')});
        }

        // 外来コマのみチェック
        const onlyOut=/外来.*のみ|外来コマのみ|外来専門/.test(s.notes||'');
        if(onlyOut){
          const viol=[];
          dates.forEach(d=>{
            const dk=tdk(d),dayAsgn=asgn[dk]||{},dayExcl=manualExclusions[dk]||{};
            (slots[d.getDay()]||[]).forEach(slot=>{
              if(slot.type!=='surg') return;
              const ids=(dayAsgn[slot.id]||[]).filter(sid=>!(dayExcl[slot.id]||[]).includes(sid));
              if(!ids.includes(s.id)) return;
              viol.push((d.getMonth()+1)+'/'+d.getDate()+'('+DAY_JP[d.getDay()]+') '+slot.label);
            });
          });
          if(viol.length===0) ok.push('外来コマのみ担当：達成');
          else ng.push({cond:'外来コマのみ担当', detail:viol.join('\n')});
        }

        // 曜日制限チェック
        const dowMatch=(s.notes||'').replace(/[０-９]/g,c=>String.fromCharCode(c.charCodeAt(0)-0xFEE0)).match(/([月火水木金土][・,、月火水木金土]*[月火水木金土])のみ(?:勤務)?(?:可能)?/);
        if(dowMatch){
          const dowMap={'月':1,'火':2,'水':3,'木':4,'金':5,'土':6};
          const allowedDows=new Set();
          for(const ch of dowMatch[1]) if(dowMap[ch]) allowedDows.add(dowMap[ch]);
          if(allowedDows.size>0){
            const viol=[];
            dates.forEach(d=>{
              const dow=d.getDay();
              if(allowedDows.has(dow)) return;
              const dk=tdk(d),dayAsgn=asgn[dk]||{},dayExcl=manualExclusions[dk]||{};
              (slots[dow]||[]).forEach(slot=>{
                const ids=(dayAsgn[slot.id]||[]).filter(sid=>!(dayExcl[slot.id]||[]).includes(sid));
                if(ids.includes(s.id)) viol.push((d.getMonth()+1)+'/'+d.getDate()+'('+DAY_JP[dow]+') '+slot.label);
              });
            });
            const allowedStr=[...allowedDows].sort().map(d=>['','月','火','水','木','金','土'][d]).join('・');
            if(viol.length===0) ok.push(allowedStr+'曜のみ勤務：達成');
            else ng.push({cond:allowedStr+'曜のみ勤務', detail:viol.join('\n')});
          }
        }

        // 1日8時間超チェック
        const overDays=[];
        dates.forEach(d=>{
          const dk=tdk(d);
          const dh=dayHours(dk,s.id,asgn,manualExclusions,slots);
          if(dh>DAILY_LIMIT) overDays.push((d.getMonth()+1)+'/'+d.getDate()+'('+DAY_JP[d.getDay()]+') '+dh.toFixed(1)+'h');
        });
        if(overDays.length>0) ng.push({cond:'1日8時間以内（労基法）', detail:overDays.join('、')});

        return {staff:s, totalH, totalSlots, ok, ng, employmentType:emp};
      } catch(e){
        console.error('Report error for '+s.name, e);
        return {staff:s, totalH:0, totalSlots:0, ok:[], ng:[{cond:'レポート生成でエラーが発生しました', detail:String(e?.message||e)}], employmentType:emp};
      }
    });
  }

  // ── 年の最初の月曜日からの通算週番号でA/Bパターンを判定 ──
  // 1月1日が含まれる週を起点に、通算第何週かでA/B交互
  function getABPatternForDate(d){
    const year=d.getFullYear();
    // その年の1月1日
    const jan1=new Date(year,0,1);
    // 1月1日が属する週の月曜日を起点にする
    const dayOfWeek=jan1.getDay(); // 0=日, 1=月, ..., 6=土
    const daysToMonday=dayOfWeek===0?-6:(1-dayOfWeek); // 月曜日までの日数
    const firstMon=new Date(jan1);
    firstMon.setDate(jan1.getDate()+daysToMonday);
    // d との差から通算週番号を計算
    const diffDays=Math.floor((d-firstMon)/(1000*60*60*24));
    const weekIdx=Math.floor(diffDays/7);
    return weekIdx%2===0?'A':'B';
  }

  // ── ベースシフトを月カレンダーに展開 ──
  function applyBaseShiftToMonth(){
    const newAsgn={...asgn};
    let appliedCount=0;
    dates.forEach(d=>{
      const dk=tdk(d);
      // 休診日はスキップ
      if(isClosedDay(dk)) return;
      const dow=d.getDay();
      const pattern=getABPatternForDate(d);
      const baseForDay=baseShift[pattern]?.[dow];
      if(!baseForDay) return;
      // 既存の割り当てがある日はスキップ（上書きしない）
      const hasExisting=newAsgn[dk]&&Object.values(newAsgn[dk]).some(ids=>(ids||[]).length>0);
      if(hasExisting) return;
      newAsgn[dk]={};
      Object.entries(baseForDay).forEach(([slotId,ids])=>{
        if(ids&&ids.length>0){
          // 存在するスタッフのみ
          newAsgn[dk][slotId]=ids.filter(sid=>staff.some(s=>s.id===sid));
        }
      });
      appliedCount++;
    });
    setAsgn(newAsgn);
    return appliedCount;
  }

  // ── ベースシフト固定スタッフを、その週(A/B)・曜日のベース登録コマ以外から外す（自動操作の最後に通す）──
  // 「土曜は奇数週の午前だけ」等の人が、自動補充で別の日・別コマに入らないようにする。
  function enforceBaseOnly(asgnObj){
    const targets=(staff||[]).filter(isBaseOnly);
    if(targets.length===0)return asgnObj;
    // ベースに一度も登場しない固定スタッフは、誤って全消ししないよう対象外（ベース未設定の保険）
    const appearsInBase=sid=>['A','B'].some(p=>Object.values(baseShift[p]||{}).some(dayObj=>Object.values(dayObj||{}).some(ids=>(ids||[]).includes(sid))));
    const enf=targets.filter(s=>appearsInBase(s.id));
    if(enf.length===0)return asgnObj;
    const na={};
    Object.entries(asgnObj||{}).forEach(([dk,sm])=>{na[dk]={};Object.entries(sm).forEach(([slotId,ids])=>{na[dk][slotId]=[...(ids||[])];});});
    (dates||[]).forEach(d=>{
      const dk=tdk(d); if(!na[dk])return;
      const dow=d.getDay();
      const baseDay=(baseShift[getABPatternForDate(d)]||{})[dow]||{};
      enf.forEach(s=>{
        Object.keys(na[dk]).forEach(slotId=>{
          if(!(na[dk][slotId]||[]).includes(s.id))return;
          if(!(baseDay[slotId]||[]).includes(s.id))na[dk][slotId]=na[dk][slotId].filter(x=>x!==s.id);
        });
      });
    });
    return na;
  }

  // ── 月切替時にベースシフトを自動展開 ──
  useEffect(()=>{
    // ベースシフトが空ならスキップ
    const hasBase=['A','B'].some(p=>Object.keys(baseShift[p]||{}).length>0);
    if(!hasBase) return;
    // 当月にすでに割り当てがあるかチェック
    const hasAsgnForMonth=dates.some(d=>{
      const dk=tdk(d);
      return asgn[dk]&&Object.values(asgn[dk]).some(ids=>(ids||[]).length>0);
    });
    if(hasAsgnForMonth) return; // 既にデータがあれば自動展開しない
    applyBaseShiftToMonth();
  // eslint-disable-next-line
  },[y,m,baseShift]);

  // ── ベースシフトの編集関数 ──
  function setBaseSlotStaff(pattern,dow,slotId,sids){
    setBaseShift(prev=>{
      const next={...prev,[pattern]:{...(prev[pattern]||{})}};
      next[pattern][dow]={...(next[pattern][dow]||{}),[slotId]:sids};
      return next;
    });
  }
  function toggleBaseSlotStaff(pattern,dow,slotId,sid){
    const cur=baseShift[pattern]?.[dow]?.[slotId]||[];
    const next=cur.includes(sid)?cur.filter(x=>x!==sid):[...cur,sid];
    setBaseSlotStaff(pattern,dow,slotId,next);
  }

  function nav(dir){
    if(dir<0){if(m===1){setY(v=>v-1);setM(12);}else setM(v=>v-1);}
    else{if(m===12){setY(v=>v+1);setM(1);}else setM(v=>v+1);}
    setSelDk(null);setARes(null);setApid(null);setAErr(null);
    setPreReliefAsgn(null);setReliefChanges([]); // 月を変えたら調整の変更点表示はクリア
  }

  // コマ単位の手動編集。終日休(tmps off)には絶対に触れない。
  // 「このコマから外す/戻す」はそのコマだけの操作で、同じ日の他コマや終日扱いには影響しない。
  function tog(dk,s2,sid){
    const inAsgn=(asgn[dk]?.[s2]||[]).includes(sid);
    const isExcluded=(manualExclusions[dk]?.[s2]||[]).includes(sid);

    if(isExcluded){
      // ① このコマの除外を解除（コマに戻す）
      setManualExclusions(p=>{const d2=p[dk]||{},sl=(d2[s2]||[]).filter(x=>x!==sid);return{...p,[dk]:{...d2,[s2]:sl}};});
      setAsgn(p=>{const d2={...(p[dk]||{})};const sl=d2[s2]||[];if(!sl.includes(sid))d2[s2]=[...sl,sid];return{...p,[dk]:d2};});
      pushEditLog(dk,s2,'add',sid);
    } else if(inAsgn){
      // ② このコマのみ除外（終日休にはしない）
      setManualExclusions(p=>{const d2={...(p[dk]||{})};const sl=d2[s2]||[];if(!sl.includes(sid))d2[s2]=[...sl,sid];return{...p,[dk]:d2};});
      pushEditLog(dk,s2,'remove',sid);
    } else {
      // ③ 未配置 → このコマに追加
      setAsgn(p=>{const d2={...(p[dk]||{})};const sl=d2[s2]||[];if(!sl.includes(sid))d2[s2]=[...sl,sid];return{...p,[dk]:d2};});
      pushEditLog(dk,s2,'add',sid);
    }
  }

  // ── 追加・修正ログ：管理者の手動コマ編集を1件記録（最新が先頭・最大500件） ──
  function pushEditLog(dk,slotId,action,sid){
    try{
      const dow=new Date(dk).getDay();
      const slot=(slots[dow]||[]).find(x=>x.id===slotId);
      const s=staff.find(x=>x.id===sid);
      const entry={ts:new Date().toISOString(),dk,slotId,
        slotLabel:slot?slot.label:String(slotId),
        slotType:slot?slot.type:'',
        action,staffId:sid,staffName:s?s.name:('ID:'+sid)};
      setEditLog(prev=>[entry,...(Array.isArray(prev)?prev:[])].slice(0,500));
    }catch(e){}
  }
  // 自動処理の「実行した事実」だけを1行記録（個々の変更内容は残さない）
  function pushEventLog(name){
    try{
      setEditLog(prev=>[{ts:new Date().toISOString(),type:'event',event:name},...(Array.isArray(prev)?prev:[])].slice(0,500));
    }catch(e){}
  }
  // ログを1行テキストに整形
  function fmtEditLogLine(e){
    const t=new Date(e.ts);
    const tStr=(t.getMonth()+1)+'/'+t.getDate()+' '+String(t.getHours()).padStart(2,'0')+':'+String(t.getMinutes()).padStart(2,'0');
    if(e.type==='event'){return tStr+'  ★ '+(e.event||'自動処理')+' を実行';}
    const d=new Date(e.dk);
    const dStr=(d.getMonth()+1)+'/'+d.getDate()+'('+DAY_JP[d.getDay()]+')';
    const kind=e.slotType==='surg'?'手術':e.slotType==='out'?'外来':'';
    const act=e.action==='add'?'追加':'削除';
    return tStr+'  '+dStr+' '+kind+'「'+e.slotLabel+'」 '+e.staffName+' を '+act;
  }
  function editLogToText(){return (editLog||[]).map(fmtEditLogLine).join('\n');}
  function copyEditLog(){
    const txt=editLogToText();
    try{navigator.clipboard.writeText(txt).then(()=>alert('ログをコピーしました。'),()=>{window.prompt('コピーしてください:',txt);});}
    catch(e){window.prompt('コピーしてください:',txt);}
  }
  function clearEditLog(){
    if(window.confirm('追加・修正ログをすべて消去しますか？\n（この操作は元に戻せません）'))setEditLog([]);
  }
  // ── シフト確定（ロック）：表示中の月の出勤配置を基準として保存 ──
  const curMonthKey=y+'-'+m;
  const curMonthLockedAt=lockedMonths[curMonthKey]||'';
  function lockCurrentMonth(){
    if(curMonthLockedAt && !window.confirm(y+'年'+m+'月は既に確定済みです（'+fmtStamp(curMonthLockedAt)+'）。\n現在の内容で確定し直しますか？\n（赤二重線・追記の基準が今の配置に更新されます）'))return;
    if(!curMonthLockedAt && !window.confirm(y+'年'+m+'月のシフトをこの内容で確定（ロック）します。\nこれ以降に変わった所は、外れた人を赤い二重線、追加された人を赤字で表示します。\nよろしいですか？'))return;
    const snap={};
    dates.forEach(d=>{
      const dk=tdk(d);
      const dow=d.getDay();
      const dExcl=manualExclusions[dk]||{};
      const dt=tmps[dk]||{};
      const slotOff=Object.entries(dt).filter(([,v])=>['off','paid'].includes(v.type)).map(([sid])=>parseInt(sid));
      const m2={};
      (slots[dow]||[]).forEach(slot=>{
        const allIds=(asgn[dk]?.[slot.id]||[]);
        m2[slot.id]=allIds.filter(sid=>!(dExcl[slot.id]||[]).includes(sid)&&!slotOff.includes(sid));
      });
      snap[dk]=m2;
    });
    setLockedAsgn(prev=>({...prev,...snap}));
    setLockedMonths(prev=>({...prev,[curMonthKey]:new Date().toISOString()}));
    alert(y+'年'+m+'月のシフトを確定（ロック）しました。');
  }
  function unlockCurrentMonth(){
    if(!window.confirm(y+'年'+m+'月の確定（ロック）を解除しますか？\n赤二重線・追記の表示が消えます。'))return;
    setLockedMonths(prev=>{const n={...prev};delete n[curMonthKey];return n;});
    setLockedAsgn(prev=>{const n={...prev};dates.forEach(d=>{delete n[tdk(d)];});return n;});
  }
  // ── 駅前データの移行（旧 id=main の {clerk,nurse,doctor} → 新 id=ekimae の {shared,doctor,nurse,clerk}）──
  // 一度きり。ドクターの slots/manualClosedDays を共通(shared)の「正」に昇格。実行前にJSONバックアップを自動保存。
  async function migrateEkimaeFromMain(){
    if(APP_CLINIC!=='ekimae'){alert('移行は駅前モードで実行してください。\nURL末尾に ?clinic=ekimae&unit=doctor を付けて開いてから実行してください。');return;}
    if(!window.confirm('駅前の旧データ(id=main)を新クリニック行(id=ekimae)へ移行します。\n・診療枠／休診日は「ドクター」を正として共通(shared)に昇格\n・各職種の配置・スタッフ等はそのまま移行\n\n先に旧データのJSONバックアップを保存します。続けますか？'))return;
    try{
      const main=await SB.getFull('shift_data');
      if(!main||typeof main!=='object'||!(main.doctor||main.nurse||main.clerk)){alert('旧データ(id=main)が取得できませんでした。ログイン状態とデータをご確認ください。');return;}
      // バックアップ保存
      try{
        const blob=new Blob([JSON.stringify(main,null,2)],{type:'application/json'});
        const a=document.createElement('a');a.href=URL.createObjectURL(blob);
        a.download='backup_shift_data_main_'+new Date().toISOString().replace(/[:.]/g,'-')+'.json';
        document.body.appendChild(a);a.click();a.remove();
      }catch(_){}
      const base=main.doctor||main.nurse||main.clerk||{};
      const shared={
        clinicName:(base.clinicName||'京都駅前耳鼻咽喉科アレルギー科クリニック'),
        slots:base.slots||{},
        newSlotCounter:base.newSlotCounter||0,
        manualClosedDays:base.manualClosedDays||{},
        updatedAt:new Date().toISOString()
      };
      const all={shared};
      ['doctor','nurse','clerk'].forEach(k=>{ const b={...(main[k]||{})}; SHARED_KEYS.forEach(s=>delete b[s]); all[k]=b; });
      // ログイン（authenticated）を確実に使う。未ログインだと書き込みが拒否されるため。
      if(!SB_ACCESS_TOKEN){try{await sbReauth();}catch(_){}}
      const doPatch=()=>fetch(`${SUPABASE_URL}/rest/v1/shift_data?id=eq.ekimae`,{
        method:'PATCH',
        headers:{'apikey':SUPABASE_KEY,'Authorization':sbBearer(),'Content-Type':'application/json','Prefer':'return=representation'},
        body:JSON.stringify({data:all,updated_at:new Date().toISOString()})
      });
      let r=await doPatch();
      if(r.status===401&&await sbReauth())r=await doPatch();
      if(r.ok){
        let rows=[]; try{rows=await r.json();}catch(_){}
        if(Array.isArray(rows)&&rows.length>0){
          alert('✅ 移行が完了しました（'+rows.length+'行を更新）。\nページを再読み込みすると、駅前(ekimae)の共通構造で表示されます。\n（旧 id=main はそのまま残っています）');
        } else {
          alert('⚠ ekimae の行が見つからず、何も書き込めませんでした。\n\nSupabaseのSQL Editorで次を実行して3行を作成してから、もう一度この移行を実行してください：\n\ninsert into public.shift_data (id, data) values\n  (\'ekimae\',\'{}\'::jsonb), (\'iguchi\',\'{}\'::jsonb), (\'karasuma\',\'{}\'::jsonb)\non conflict (id) do nothing;');
        }
      }
      else{alert('移行の書き込みに失敗しました（status '+r.status+'）。\nSupabaseで id=ekimae の行が作成済みか、権限をご確認ください。');}
    }catch(e){alert('移行に失敗しました：'+(e&&e.message||e));}
  }

  function togExclusion(dk,slotId,sid){
    const inAsgn=(asgn[dk]?.[slotId]||[]).includes(sid);
    const isExcluded=(manualExclusions[dk]?.[slotId]||[]).includes(sid);

    if(isExcluded){
      // ① このコマの除外を解除（コマに戻す）
      setManualExclusions(p=>{const d2=p[dk]||{},sl=(d2[slotId]||[]).filter(x=>x!==sid);return{...p,[dk]:{...d2,[slotId]:sl}};});
      setAsgn(p=>{const d2={...(p[dk]||{})};const sl=d2[slotId]||[];if(!sl.includes(sid))d2[slotId]=[...sl,sid];return{...p,[dk]:d2};});
      pushEditLog(dk,slotId,'add',sid);
    } else if(inAsgn){
      // ② このコマのみ除外（同じ日の他コマ・終日扱いには影響しない）
      setManualExclusions(p=>{const d2={...(p[dk]||{})};const sl=d2[slotId]||[];if(!sl.includes(sid))d2[slotId]=[...sl,sid];return{...p,[dk]:d2};});
      pushEditLog(dk,slotId,'remove',sid);
    } else {
      // ③ 未配置 → このコマに追加
      setAsgn(p=>{const d2={...(p[dk]||{})};const sl=d2[slotId]||[];if(!sl.includes(sid))d2[slotId]=[...sl,sid];return{...p,[dk]:d2};});
      pushEditLog(dk,slotId,'add',sid);
    }
  }

  function setTmp(dk,sid,type,note){
    setTmps(p=>{const d2={...(p[dk]||{})};if(type===null){delete d2[String(sid)];}else{d2[String(sid)]={type,note:note||''};}return{...p,[dk]:d2};});
    // off/paid（終日休）設定時 → その日の全コマからmanualExclusionsに追加してシフト表に反映
    const fullOffTypes=['off','paid'];
    if(fullOffTypes.includes(type)){
      setManualExclusions(prev=>{
        const dayAsgn=asgn[dk]||{};
        const d2={...(prev[dk]||{})};
        Object.keys(dayAsgn).forEach(slotId=>{
          const cur=d2[slotId]||[];
          if((dayAsgn[slotId]||[]).includes(sid)&&!cur.includes(sid))d2[slotId]=[...cur,sid];
        });
        return{...prev,[dk]:d2};
      });
    } else if(type===null){
      // クリア時 → manualExclusionsからも解除
      setManualExclusions(prev=>{
        const d2={...(prev[dk]||{})};
        Object.keys(d2).forEach(slotId=>{d2[slotId]=(d2[slotId]||[]).filter(x=>x!==sid);});
        return{...prev,[dk]:d2};
      });
    }
  }

  function applyPaidLeave(dk,sid,unit){

    setTmps(p=>{const d2={...(p[dk]||{})};d2[String(sid)]={type:t,note:'',unit};return{...p,[dk]:d2};});

    if(unit==='full'){

        const dayAsgn=asgn[dk]||{};
        const d2={...(prev[dk]||{})};
        Object.keys(dayAsgn).forEach(slotId=>{
          const cur=d2[slotId]||[];
          if((dayAsgn[slotId]||[]).includes(sid)&&!cur.includes(sid))d2[slotId]=[...cur,sid];
        });
        return{...prev,[dk]:d2};
      });
    }
    setPaidLeave(prev=>{
      const cur=prev[sid]||{granted:0,history:[]};
      const filtered=(cur.history||[]).filter(r=>!(r.dk===dk&&r.unit===unit));
      const entry={dk,unit,appliedAt:new Date().toISOString()};
      return{...prev,[sid]:{...cur,history:[...filtered,entry]}};

  // ── 最低勤務時間の自動補完 ──
  function autoFillHours(){
    setAsgn(prev=>{
      const next={};
      Object.entries(prev).forEach(([dk,slotMap])=>{
        next[dk]={};
        Object.entries(slotMap).forEach(([sid,ids])=>{next[dk][sid]=[...(ids||[])];});
      });

      // 常勤→パート→未設定の順で処理（常勤を優先して空き枠を埋める）
      const sortedStaff=[
        ...staff.filter(s=>parseEmploymentType(s.notes)==='fulltime'),
        ...staff.filter(s=>parseEmploymentType(s.notes)==='parttime'),
        ...staff.filter(s=>!parseEmploymentType(s.notes)),
      ];

      sortedStaff.forEach(s=>{
        const wh=parseWeeklyHours(s.notes);
        if(!wh||wh.min<=0) return;

        weeks.forEach(weekDates=>{
          let wTotal=weekHours(s.id,weekDates,next,manualExclusions,slots);
          if(wTotal>=wh.min) return;

          for(const d of weekDates){
            if(wTotal>=wh.min) break;
            const dk=tdk(d);
            const dow=d.getDay();
            const daySlots=slots[dow]||[];

            for(const slot of daySlots){
              if(wTotal>=wh.min) break;
              const curIds=next[dk]?.[slot.id]||[];
              if(curIds.includes(s.id)) continue;
              if((manualExclusions[dk]?.[slot.id]||[]).includes(s.id)) continue;
              // 必要人数に達しているコマには追加しない
              const reqCount=getReq(dk,slot.id);
              const activeCount=curIds.filter(sid=>!(manualExclusions[dk]?.[slot.id]||[]).includes(sid)).length;
              if(activeCount>=reqCount) continue;
              const dh=dayHours(dk,s.id,next,manualExclusions,slots);
              const sh=slotHours(dow,slot.id,slots);
              if(dh+sh>DAILY_LIMIT) continue;
              if(wTotal+sh>WEEKLY_LIMIT) continue;

              if(!next[dk]) next[dk]={};
              if(!next[dk][slot.id]) next[dk][slot.id]=[];
              next[dk][slot.id]=[...next[dk][slot.id],s.id];
              wTotal+=sh;
            }
          }
        });
      });
      return next;
    });
    // 常勤の最低時間達成を最優先（パートとの入れ替えも含む）
    setTimeout(()=>setAsgn(prev=>fillFulltimeMinHours(prev)),0);
    setHasManualEdits(true);
  }
  // 時間帯文字列「HH:MM-HH:MM」から労働時間(h)を計算（全角文字も許容）
  function calcHoursFromTime(timeStr){
    if(!timeStr)return null;
    // 全角→半角に正規化
    const normalized=timeStr
      .replace(/[０-９]/g,c=>String.fromCharCode(c.charCodeAt(0)-0xFEE0))
      .replace(/[:：]/g,':')
      .replace(/[‐ー－–—~〜～]/g,'-');
    const m=normalized.match(/(\d{1,2}):(\d{2})\s*-\s*(\d{1,2}):(\d{2})/);
    if(!m)return null;
    const start=parseInt(m[1])*60+parseInt(m[2]);
    const end  =parseInt(m[3])*60+parseInt(m[4]);
    const diff=(end-start)/60;
    return diff>0?Math.round(diff*10)/10:null;
  }

      return next;
    });
  }
