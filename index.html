  // ── 常勤スタッフの最低時間を必ず達成する（必要ならパートと入れ替え）──
  function fillFulltimeMinHours(rawAsgn){
    const na={};
    Object.entries(rawAsgn).forEach(([dk,sm])=>{
      na[dk]={};
      Object.entries(sm).forEach(([slotId,ids])=>{na[dk][slotId]=[...(ids||[])];});
    });

    const fulltimeStaff=staff.filter(s=>parseEmploymentType(s.notes)==='fulltime');

    fulltimeStaff.forEach(ft=>{
      const wh=parseWeeklyHours(ft.notes);
      if(!wh||wh.min<=0) return;
      const maxH=Math.min(wh.max||WEEKLY_LIMIT,WEEKLY_LIMIT);

      weeks.forEach(weekDates=>{
        if(weekDates.length<3) return;
        let wTotal=weekHours(ft.id,weekDates,na,{},slots);
        if(wTotal>=wh.min) return;

        // 追加可能なコマを全列挙（日数×コマ）
        const candidates=[];
        weekDates.forEach(d=>{
          const dk=tdk(d),dow=d.getDay();
          (slots[dow]||[]).forEach(slot=>{
            const curIds=na[dk]?.[slot.id]||[];
            if(curIds.includes(ft.id)) return;
            if((manualExclusions[dk]?.[slot.id]||[]).includes(ft.id)) return;
            const sh=slotHours(dow,slot.id,slots);
            if(sh<=0) return;
            // 日の合計がDAILY_LIMITを超えないか確認
            const dh=dayHours(dk,ft.id,na,{},slots);
            if(dh+sh>DAILY_LIMIT) return;
            if(wTotal+sh>maxH) return;
            const req=getReq(dk,slot.id);
            const curActive=curIds.filter(sid=>!(manualExclusions[dk]?.[slot.id]||[]).includes(sid)).length;
            // 優先度：人員不足のコマ > パートがいるコマ > その他
            const hasPart=curIds.some(sid=>{
              const s=staff.find(x=>x.id===sid);
              return s&&parseEmploymentType(s.notes)==='parttime';
            });
            const priority=curActive<req?0:hasPart?1:2;
            candidates.push({dk,dow,slot,sh,curIds,req,curActive,hasPart,priority});
          });
        });

        if(candidates.length===0) return;

        // 優先度順・同優先度は曜日でラウンドロビン
        candidates.sort((a,b)=>a.priority-b.priority||(a.dow-b.dow));

        for(const c of candidates){
          if(wTotal>=wh.min) break;
          const {dk,slot,sh,curIds,curActive,req,hasPart}=c;

          // Step1: 人員不足コマに追加（そのまま）
          if(curActive<req){
            if(!na[dk][slot.id]) na[dk][slot.id]=[];
            na[dk][slot.id]=[...na[dk][slot.id],ft.id];
            wTotal+=sh;
            continue;
          }

          // Step2: パートと入れ替え（パートの最低時間・コマ数を維持できる場合）
          if(hasPart){
            const sw=curIds.find(sid=>{
              const sv=staff.find(x=>x.id===sid);
              if(!sv||parseEmploymentType(sv.notes)!=='parttime') return false;
              // 週間時間制約チェック
              const ptWh=parseWeeklyHours(sv.notes);
              if(ptWh&&ptWh.min>0){
                const ptWeekH=weekHours(sid,weekDates,na,{},slots);
                if((ptWeekH-sh)<ptWh.min) return false;
              }
              // コマ数保護：抜くとその週が0コマになる人は除外
              const curWeekSlots=weekDates.reduce((sum,wd)=>{
                const wdk=tdk(wd),wda=na[wdk]||{},wdEx=manualExclusions[wdk]||{};
                return sum+Object.values(wda).reduce((s2,ids2)=>
                  s2+((ids2||[]).filter(id2=>id2===sid&&!Object.entries(wdEx).some(([si,ex])=>(ex||[]).includes(id2))).length),0);
              },0);
              if(curWeekSlots<=1) return false; // 最低1コマは残す
              return true;
            });
            if(sw!==undefined){
              na[dk][slot.id]=curIds.filter(sid=>sid!==sw).concat([ft.id]);
              wTotal+=sh;
              continue;
            }
          }

          // Step3: 必要人数を超えるパートがいる場合（超過分を整理、コマ数保護あり）
          if(curActive>req&&hasPart){
            const sw=curIds.find(sid=>{
              const sv=staff.find(x=>x.id===sid);
              if(!sv||parseEmploymentType(sv.notes)!=='parttime') return false;
              const curWeekSlots=weekDates.reduce((sum,wd)=>{
                const wdk=tdk(wd),wda=na[wdk]||{};
                return sum+Object.values(wda).reduce((s2,ids2)=>s2+((ids2||[]).filter(id2=>id2===sid).length),0);
              },0);
              return curWeekSlots>1; // 最低1コマは残す
            });
            if(sw!==undefined){
              na[dk][slot.id]=curIds.filter(sid=>sid!==sw).concat([ft.id]);
              wTotal+=sh;
              continue;
            }
          }

          // Step4: 最終手段 - 必要人数を超えても常勤を追加
          if(!na[dk]) na[dk]={};
          if(!na[dk][slot.id]) na[dk][slot.id]=[];
          na[dk][slot.id]=[...na[dk][slot.id],ft.id];
          wTotal+=sh;
        }
      });
    });
    return na;
  }

  // ── 週コマ数の最低保証（「週1〜2コマ」の「1」を保証）──
  function ensureMinSlots(rawAsgn){
    const na={};
    Object.entries(rawAsgn).forEach(([dk,sm])=>{
      na[dk]={};
      Object.entries(sm).forEach(([slotId,ids])=>{na[dk][slotId]=[...(ids||[])];});
    });

    // コマ数制約を持つ全スタッフを対象
    staff.forEach(s=>{
      const notesN=(s.notes||'').replace(/[０-９]/g,c=>String.fromCharCode(c.charCodeAt(0)-0xFEE0));
      const m1=notesN.match(/週\s*(\d+)\s*[〜~～]\s*(\d+)\s*コマ/);
      const m2=notesN.match(/週\s*(\d+)\s*コマ/);
      const minSlots=m1?parseInt(m1[1]):m2?parseInt(m2[1]):0;
      if(minSlots<=0) return;

      weeks.forEach(weekDates=>{
        if(weekDates.length<3) return;
        // 現在の週コマ数を計算
        let wkSlots=weekDates.reduce((sum,d)=>{
          const dk=tdk(d),da=na[dk]||{},dExcl=manualExclusions[dk]||{};
          return sum+Object.entries(da).reduce((s2,[slotId,ids])=>
            s2+((ids||[]).filter(id=>id===s.id&&!(dExcl[slotId]||[]).includes(id)).length),0);
        },0);
        if(wkSlots>=minSlots) return;

        // 不足分を追加
        for(const d of weekDates){
          if(wkSlots>=minSlots) break;
          const dk=tdk(d),dow=d.getDay();
          for(const slot of (slots[dow]||[])){
            if(wkSlots>=minSlots) break;
            const curIds=na[dk]?.[slot.id]||[];
            if(curIds.includes(s.id)) continue;
            if((manualExclusions[dk]?.[slot.id]||[]).includes(s.id)) continue;
            const dh=dayHours(dk,s.id,na,{},slots);
            const sh=slotHours(dow,slot.id,slots);
            if(dh+sh>DAILY_LIMIT) continue;
            const req=getReq(dk,slot.id);
            // 必要人数の2倍を超えるような過剰配置はしない
            if(curIds.length>=req*2) continue;
            if(!na[dk]) na[dk]={};
            if(!na[dk][slot.id]) na[dk][slot.id]=[];
            na[dk][slot.id]=[...na[dk][slot.id],s.id];
            wkSlots++;
          }
        }
      });
    });
    return na;
  }

  // ── ベースシフトを当月の全開院日に展開（土台）。手動除外は尊重 ──
  function buildBaseAsgn(){
    const base={};
    dates.forEach(d=>{
      const dk=tdk(d);
      if(isClosedDay(dk))return;
      const dow=d.getDay();
      const pattern=getABPatternForDate(d);
      const baseForDay=(baseShift[pattern]||{})[dow]||{};
      Object.entries(baseForDay).forEach(([slotId,ids])=>{
        const valid=(ids||[]).filter(sid=>staff.some(s=>s.id===sid)&&!(manualExclusions[dk]?.[slotId]||[]).includes(sid));
        if(valid.length===0)return;
        if(!base[dk])base[dk]={};
        base[dk][slotId]=[...valid];
      });
    });
    return base;
  }
  // ベースシフト配置を「絶対に削らない」ためのpinnedセットを作る
  function pinnedFromBase(base){
    const set=new Set();
    Object.entries(base).forEach(([dk,sm])=>Object.entries(sm).forEach(([slotId,ids])=>(ids||[]).forEach(sid=>set.add(dk+'|'+slotId+'|'+sid))));
    return set;
  }
  // src を target に加算マージ（重複なし）
  function mergeAsgnInto(target,src){
    Object.entries(src||{}).forEach(([dk,sm])=>{
      if(!target[dk])target[dk]={};
      Object.entries(sm).forEach(([slotId,ids])=>{
        const cur=target[dk][slotId]||[];
        const merged=[...cur];
        (ids||[]).forEach(sid=>{if(!merged.includes(sid))merged.push(sid);});
        target[dk][slotId]=merged;
      });
    });
    return target;
  }
  // ── 最終仕上げ：①ベースシフトを土台に配置 → ②AI結果を重ねる →
  //   ③労働時間調整（ベース分は削らない） → ④常勤最低時間/最低コマ補完 → ⑤ベース被覆の最終保証 ──
  function finalizeAsgn(aiAsgn){
    const base=buildBaseAsgn();
    const pinned=pinnedFromBase(base);
    // 必要人数マップ（dk|slotId→必要数）：時間調整で必要数を下回らせない
    const reqMap={};
    (patReqList||[]).forEach(({dk,reqBySlot})=>{Object.entries(reqBySlot).forEach(([sid,r])=>{reqMap[dk+'|'+sid]=r;});});
    let na={};
    mergeAsgnInto(na,base);      // ① ベースシフトを土台に
    mergeAsgnInto(na,aiAsgn||{});// ② AI結果を上乗せ
    na=dropPoorCoverage(na);     // ②.5 勤務不可/半分も出られないコマから除去（ベースは後で復活）
    na=enforceHourLimits(na,staff,weeks,slots,pinned,reqMap); // ③ ベース保護＋必要数は維持
    na=fillFulltimeMinHours(na); // ④
    na=ensureMinSlots(na);       // ④
    na=ensureBaseCoverage(na);   // ⑤ 念のための最終保証
    na=fixCoverageGaps(na);      // ⑥ 時間帯の無人(0名)を解消（早退者だけのコマを補修）
    na=trimOverstaff(na);        // ⑦ 過剰配置・1日8時間超のトリム（8時間厳守を最優先）
    return na;
  }

  // ── 勤務できない/ほとんど出られないコマからスタッフを外す ──
  // 退勤・出勤開始の制限で、そのコマの半分も在席できない人を除去（例：15時退勤の人を13:45-19:45の夜外来から外す）
  function dropPoorCoverage(rawAsgn){
    const na={};
    Object.entries(rawAsgn||{}).forEach(([dk,sm])=>{na[dk]={};Object.entries(sm).forEach(([slotId,ids])=>{na[dk][slotId]=[...(ids||[])];});});
    dates.forEach(d=>{
      const dk=tdk(d); if(isClosedDay(dk)||!na[dk])return;
      const dow=d.getDay();
      Object.keys(na[dk]).forEach(slotId=>{
        const slot=(slots[dow]||[]).find(s=>s.id===slotId); if(!slot)return;
        na[dk][slotId]=(na[dk][slotId]||[]).filter(sid=>{
          const so=staff.find(s=>s.id===sid);
          return canCoverSlot(so,slot,dow);
        });
      });
    });
    return na;
  }

  // ── 配置の偏り調整 ──
  // 同じ種類のコマ（手術↔手術 / 外来↔外来）の中で、定員より多い枠から、
  // 定員に満たない枠へ、勤務可能なスタッフを移して均す。
  function rebalanceDayCoverage(rawAsgn){
    const na={};
    Object.entries(rawAsgn||{}).forEach(([dk,sm])=>{na[dk]={};Object.entries(sm).forEach(([slotId,ids])=>{na[dk][slotId]=[...(ids||[])];});});
    const isOffOrExcl=(dk,slotId,sid)=>{
      if((manualExclusions[dk]?.[slotId]||[]).includes(sid))return true;
      const tc=tmps[dk]?.[String(sid)];
      return !!(tc&&['off','paid','paid_am','paid_pm'].includes(tc.type));
    };
    const activeCount=(dk,slotId)=>(na[dk]?.[slotId]||[]).filter(sid=>!isOffOrExcl(dk,slotId,sid)).length;
    dates.forEach(d=>{
      const dk=tdk(d); if(isClosedDay(dk)||!na[dk])return;
      const dow=d.getDay();
      const week=weeks.find(w=>w.some(x=>tdk(x)===dk))||[];
      const daySlots=slots[dow]||[];
      daySlots.forEach(B=>{
        const reqB=getReq(dk,B.id); if(reqB<=0)return;
        let guard=0;
        while(activeCount(dk,B.id)<reqB && guard++<10){
          let moved=false;
          for(const A of daySlots){
            if(A.id===B.id)continue;
            if(A.type!==B.type)continue; // 同種コマ間のみ（スキル安全）
            if(activeCount(dk,A.id)<=getReq(dk,A.id))continue; // Aに余剰がなければ動かさない
            const rB=slotRangeMin(B);
            const cand=(na[dk][A.id]||[]).find(sid=>{
              if(isOffOrExcl(dk,A.id,sid))return false;
              if((na[dk][B.id]||[]).includes(sid))return false;
              const so=staff.find(s=>s.id===sid);
              if(isBaseOnly(so))return false; // ベースシフト固定の人は移動させない
              if(!canCoverSlot(so,B,dow))return false; // そのコマの半分も在席できない人は移さない
              // 移動を試算：Aから外しBへ入れて、8時間以内・週上限以内か
              const trial={...na,[dk]:{...na[dk],[A.id]:(na[dk][A.id]||[]).filter(x=>x!==sid),[B.id]:[...(na[dk][B.id]||[]),sid]}};
              if(dayHours(dk,sid,trial,manualExclusions,slots,staff)>DAILY_LIMIT)return false;
              const wh=parseWeeklyHours(notes);
              if(wh&&wh.max>0&&week.length>0){
                const wkH=week.reduce((s2,d3)=>s2+dayHours(tdk(d3),sid,trial,manualExclusions,slots,staff),0);
                if(wkH>Math.min(wh.max,WEEKLY_LIMIT))return false;
              }
              return true;
            });
            if(cand!=null){
              na[dk][A.id]=(na[dk][A.id]||[]).filter(x=>x!==cand);
              na[dk][B.id]=[...(na[dk][B.id]||[]),cand];
              moved=true; break;
            }
          }
          if(!moved)break;
        }
      });
    });
    return na;
  }

  // ── 超過勤務(1日8時間超)の自動調整 ──
  // ①超過者を末尾コマから外して8時間以内に収める
  // ②空いた枠は「その日すでに出勤していて前後を延長すれば入れる人」で補う（1時間のために新規出勤はさせない）
  function relieveDailyOvertime(rawAsgn){
    const na={};
    Object.entries(rawAsgn||{}).forEach(([dk,sm])=>{na[dk]={};Object.entries(sm).forEach(([slotId,ids])=>{na[dk][slotId]=[...(ids||[])];});});
    const isOffOrExcl=(dk,slotId,sid)=>{
      if((manualExclusions[dk]?.[slotId]||[]).includes(sid))return true;
      const tc=tmps[dk]?.[String(sid)];
      return !!(tc&&['off','paid','paid_am','paid_pm'].includes(tc.type));
    };
    const staffRanges=(dk,sid)=>{
      const dow=new Date(dk).getDay(); const out=[];
      Object.entries(na[dk]||{}).forEach(([slotId,ids])=>{
        if(!ids.includes(sid))return;
        if(isOffOrExcl(dk,slotId,sid))return;
        const slot=(slots[dow]||[]).find(s=>s.id===slotId);
        const r=slot?slotRangeMin(slot):null;
        if(r&&r.s!=null&&r.e!=null)out.push({slotId,s:r.s,e:r.e});
      });
      return out;
    };
    dates.forEach(d=>{
      const dk=tdk(d); if(isClosedDay(dk)||!na[dk])return;
      const dow=d.getDay();
      const week=weeks.find(w=>w.some(x=>tdk(x)===dk))||[];
      // ① トリム：超過者を末尾コマから外す
      staff.forEach(s=>{
        let guard=0;
        while(dayHours(dk,s.id,na,manualExclusions,slots,staff)>DAILY_LIMIT && guard++<12){
          const rs=staffRanges(dk,s.id);
          if(rs.length<=1)break; // 1コマだけなら外せない
          rs.sort((a,b)=>b.e-a.e||b.s-a.s); // 最も遅く終わるコマ
          na[dk][rs[0].slotId]=(na[dk][rs[0].slotId]||[]).filter(x=>x!==s.id);
        }
      });
      // ② 不足枠を「その日出勤中の人の延長」で補う
      (slots[dow]||[]).forEach(slot=>{
        const req=getReq(dk,slot.id); if(req<=0)return;
        const activeCnt=()=> (na[dk][slot.id]||[]).filter(sid=>!isOffOrExcl(dk,slot.id,sid)).length;
        if(activeCnt()>=req)return;
        const r=slotRangeMin(slot); if(!r||r.s==null||r.e==null)return;
        const cands=staff.filter(s=>{
          if((na[dk][slot.id]||[]).includes(s.id))return false;
          if(isOffOrExcl(dk,slot.id,s.id))return false;
          if(isBaseOnly(s))return false; // ベースシフト固定の人は延長配置しない
          if(!canCoverSlot(s,slot,dow))return false; // そのコマの半分も在席できない人は延長させない
          const sp=staffRanges(dk,s.id); if(sp.length===0)return false; // その日出勤していない人は呼ばない
          const cs=Math.min.apply(null,sp.map(x=>x.s)), ce=Math.max.apply(null,sp.map(x=>x.e));
          if(!(r.s<=ce && r.e>=cs))return false; // 既存シフトと前後で連続/重複している（延長で入れる）
          // スキル：このコマにベース(A/B)登録 or 当月の同曜日でこのコマを担当している
          const inBase=['A','B'].some(p=>(((baseShift[p]||{})[dow]||{})[slot.id]||[]).includes(s.id));
          const elsewhere=dates.some(d2=>{const k2=tdk(d2);return d2.getDay()===dow&&k2!==dk&&(na[k2]?.[slot.id]||[]).includes(s.id);});
          if(!inBase&&!elsewhere)return false;
          // 延長後も8時間以内・週上限以内
          const trial={...na,[dk]:{...na[dk],[slot.id]:[...(na[dk][slot.id]||[]),s.id]}};
          if(dayHours(dk,s.id,trial,manualExclusions,slots,staff)>DAILY_LIMIT)return false;
          const wh=parseWeeklyHours(s.notes);
          if(wh&&wh.max>0&&week.length>0){
            const wkH=week.reduce((sum,d3)=>sum+dayHours(tdk(d3),s.id,trial,manualExclusions,slots,staff),0);
            if(wkH>Math.min(wh.max,WEEKLY_LIMIT))return false;
          }
          return true;
        });
        // 追加負担（延長で増える時間）が少ない順
        const extra=(sid)=>{const sp=staffRanges(dk,sid);const cs=Math.min.apply(null,sp.map(x=>x.s)),ce=Math.max.apply(null,sp.map(x=>x.e));return (Math.max(ce,r.e)-Math.min(cs,r.s))-(ce-cs);};
        cands.sort((a,b)=>extra(a.id)-extra(b.id));
        for(const c of cands){ if(activeCnt()>=req)break; na[dk][slot.id]=[...(na[dk][slot.id]||[]),c.id]; }
      });
    });
    return na;
  }
  // ── 時間帯の無人(0名)を解消する ──
  // 各コマは開始〜終了まで途切れなく最低1名が在席している必要がある。
  // 「18時まで」など早退する人だけが入っていると、コマ終了まで在席できず
  // 終盤が無人(0名)になる。これを検出し、その時間帯をカバーできる人を配置する。
  // 優先順位: ①同種コマの余剰枠から移動 → ②その日まだ未出勤の有資格者を新規配置
  //           → ③同種コマの定員ちょうどの枠から移動（移動元が無人にならない範囲で定員割れを許容）
  //           （無人(0名)にするより、他コマの定員割れの方が良い、という方針）
  function fixCoverageGaps(rawAsgn){
    const na={};
    Object.entries(rawAsgn||{}).forEach(([dk,sm])=>{na[dk]={};Object.entries(sm).forEach(([slotId,ids])=>{na[dk][slotId]=[...(ids||[])];});});
    const isOffOrExcl=(dk,slotId,sid)=>{
      if((manualExclusions[dk]?.[slotId]||[]).includes(sid))return true;
      const tc=tmps[dk]?.[String(sid)];
      return !!(tc&&['off','paid','paid_am','paid_pm'].includes(tc.type));
    };
    const activeIds=(dk,slotId)=>(na[dk]?.[slotId]||[]).filter(sid=>!isOffOrExcl(dk,slotId,sid));
    const activeCount=(dk,slotId)=>activeIds(dk,slotId).length;
    // コマslot(曜日dow)の現在の無人帯（最初の1つ）。なければnull
    const gapOf=(dk,slot,dow)=>{
      const r=slotRangeMin(slot); if(!r||r.s==null||r.e==null)return null;
      const iv=activeIds(dk,slot.id).map(sid=>staffPresenceInSlot(staff.find(x=>x.id===sid),slot,dow,na[dk])).filter(Boolean);
      return firstUncoveredBand(r,iv);
    };
    // sidが帯[g1,g2]を丸ごとカバーできるか（コマ範囲内・出勤開始/退勤を考慮）
    const canCoverBand=(dk,sid,slot,dow,g1,g2)=>{
      const p=staffPresenceInSlot(staff.find(x=>x.id===sid),slot,dow,na[dk]);
      return !!(p&&p.s<=g1&&p.e>=g2);
    };
    // sidがそのコマに有資格か
    //  ・外来(out)コマ: 特別なスキル不要 → 勤務可能な人は誰でも配置可（新規登録者も対象）
    //  ・手術(surg)等: v106 → 勤務条件のスキル(staffSkill)で判定。「手術のみ/外来・手術可」の人は手術コマOK、
    //    「外来のみ」は不可。（旧版はベース登録/同曜日実績のみ許可していたため、手術可の人でも当該曜日に
    //     実績がないと応援追加できず、木曜午後手術などの無人帯が埋まらなかった。スキルが信頼できる現行データに合わせて緩和）
    const qualified=(dk,sid,slot,dow)=>{
      if(slot.type==='out')return true;
      return staffSkill(staff.find(x=>x.id===sid))!=='out';
    };
    // sがその曜日(dow)に勤務可能か（新規応援配置の安全弁）
    //  ・勤務条件(cond.days)が設定されていればそれを信頼（UIで登録した人はこちら）
    //  ・cond未設定の旧データは「ベース登録 or 当月同曜日の実績がある曜日」のみ可とみなす
    const worksThisDay=(s,dow)=>{
      if(!s)return false;
      if(isBaseOnly(s))return false; // ベースシフト固定の人は不足補充の対象外
      const c=s.cond;
      if(c&&c.days&&Object.keys(c.days).length){ return c.days[dow]!==false; }
      const inBaseAnyDow=['A','B'].some(p=>{const dd=(baseShift[p]||{})[dow]||{};return Object.values(dd).some(ids=>(ids||[]).includes(s.id));});
      if(inBaseAnyDow)return true;
      return dates.some(d2=>d2.getDay()===dow&&Object.values(na[tdk(d2)]||{}).some(ids=>(ids||[]).includes(s.id)));
    };
    // trial配置でsidが1日8h・週上限を超えないか
    // v106: 無人帯解消を最優先（v105と整合）。本人の「希望」週上限(wh.max=○時間以内等)はソフト扱いにして
    //       超過を許す。1日8時間(DAILY_LIMIT)と法定相当の週40時間(WEEKLY_LIMIT)のみ厳守。
    const trialOK=(dk,sid,trial,week)=>{
      if(dayHours(dk,sid,trial,manualExclusions,slots,staff)>DAILY_LIMIT)return false;
      if(week&&week.length>0){
        const wkH=week.reduce((sum,d3)=>sum+dayHours(tdk(d3),sid,trial,manualExclusions,slots,staff),0);
        if(wkH>WEEKLY_LIMIT)return false;
      }
      return true;
    };
    dates.forEach(d=>{
      const dk=tdk(d); if(isClosedDay(dk)||!na[dk])return;
      const dow=d.getDay();
      const week=weeks.find(w=>w.some(x=>tdk(x)===dk))||[];
      const daySlots=slots[dow]||[];
      daySlots.forEach(B=>{
        if(getReq(dk,B.id)<=0)return; // 配置不要のコマは対象外
        let guard=0;
        while(guard++<8){
          const gap=gapOf(dk,B,dow);
          if(!gap)break;
          let filled=false;
          // ① 同種コマの余剰枠から移動
          for(const A of daySlots){
            if(A.id===B.id||A.type!==B.type)continue;
            if(activeCount(dk,A.id)<=getReq(dk,A.id))continue; // 余剰がなければ動かさない
            const cand=activeIds(dk,A.id).find(sid=>
              !(na[dk][B.id]||[]).includes(sid)&&canCoverBand(dk,sid,B,dow,gap.s,gap.e));
            if(cand!=null){
              const trial={...na,[dk]:{...na[dk],
                [A.id]:(na[dk][A.id]||[]).filter(x=>x!==cand),
                [B.id]:[...(na[dk][B.id]||[]),cand]}};
              if(trialOK(dk,cand,trial,week)){
                na[dk][A.id]=trial[dk][A.id];na[dk][B.id]=trial[dk][B.id];filled=true;break;
              }
            }
          }
          if(filled)continue;
          // ② その日まだ未出勤の有資格者を新規配置（応援出勤）
          const working=sid=>Object.values(na[dk]||{}).some(ids=>(ids||[]).includes(sid));
          const fresh=staff.find(s=>
            !working(s.id)&&!isOffOrExcl(dk,B.id,s.id)&&worksThisDay(s,dow)&&
            qualified(dk,s.id,B,dow)&&canCoverBand(dk,s.id,B,dow,gap.s,gap.e)&&
            trialOK(dk,s.id,{...na,[dk]:{...na[dk],[B.id]:[...(na[dk][B.id]||[]),s.id]}},week));
          if(fresh){na[dk][B.id]=[...(na[dk][B.id]||[]),fresh.id];filled=true;continue;}
          // ③ 同種コマの定員ちょうどの枠から移動（移動元が無人にならない範囲で定員割れを許容）
          for(const A of daySlots){
            if(A.id===B.id||A.type!==B.type)continue;
            if(activeCount(dk,A.id)<=1)continue; // 移動元を0名にしない
            const cand=activeIds(dk,A.id).find(sid=>{
              if((na[dk][B.id]||[]).includes(sid))return false;
              if(!canCoverBand(dk,sid,B,dow,gap.s,gap.e))return false;
              // 移動後もAに無人帯が生まれないこと
              const restIv=activeIds(dk,A.id).filter(x=>x!==sid)
                .map(x=>staffPresenceInSlot(staff.find(z=>z.id===x),A,dow,na[dk])).filter(Boolean);
              if(firstUncoveredBand(slotRangeMin(A),restIv))return false;
              const trial={...na,[dk]:{...na[dk],
                [A.id]:(na[dk][A.id]||[]).filter(x=>x!==sid),
                [B.id]:[...(na[dk][B.id]||[]),sid]}};
              return trialOK(dk,sid,trial,week);
            });
            if(cand!=null){
              na[dk][A.id]=(na[dk][A.id]||[]).filter(x=>x!==cand);
              na[dk][B.id]=[...(na[dk][B.id]||[]),cand];filled=true;break;
            }
          }
          if(!filled)break; // 解消できる人がいない → そのまま（gapsで別途報告）
        }
      });
    });
    return na;
  }
  // ── 過剰配置・1日8時間超のトリム ──
  // 方針: ①1日8時間超を解消（重複しているコマ＝特に定員オーバーの枠から外す）
  //       ②定員オーバーの枠から「その日に他コマもある重複者」を外して定員まで減らす
  //   ・無人(0名)になる外し方はしない　・週の最低時間を割る人は外さない　・8時間厳守を最優先（定員割れは許容）
  function trimOverstaff(rawAsgn){
    const na={};
    Object.entries(rawAsgn||{}).forEach(([dk,sm])=>{na[dk]={};Object.entries(sm).forEach(([slotId,ids])=>{na[dk][slotId]=[...(ids||[])];});});
    const isOffOrExcl=(dk,slotId,sid)=>{
      if((manualExclusions[dk]?.[slotId]||[]).includes(sid))return true;
      const tc=tmps[dk]?.[String(sid)];
      return !!(tc&&['off','paid','paid_am','paid_pm'].includes(tc.type));
    };
    const activeIds=(dk,slotId)=>(na[dk]?.[slotId]||[]).filter(sid=>!isOffOrExcl(dk,slotId,sid));
    const activeCount=(dk,slotId)=>activeIds(dk,slotId).length;
    const dh=(dk,sid,state)=>dayHours(dk,sid,state||na,manualExclusions,slots,staff);
    // sidをslotから外すと、そのコマに無人帯ができるか
    const wouldGap=(dk,slot,dow,sid)=>{
      const rest=activeIds(dk,slot.id).filter(x=>x!==sid).map(x=>staffPresenceInSlot(staff.find(z=>z.id===x),slot,dow,na[dk])).filter(Boolean);
      return !!firstUncoveredBand(slotRangeMin(slot),rest);
    };
    const numSlots=(dk,dow,sid)=>(slots[dow]||[]).filter(sl=>activeIds(dk,sl.id).includes(sid)).length;
    const drop=(dk,slotId,sid)=>{na[dk][slotId]=(na[dk][slotId]||[]).filter(x=>x!==sid);};
    dates.forEach(d=>{
      const dk=tdk(d); if(isClosedDay(dk)||!na[dk])return;
      const dow=d.getDay();
      const week=weeks.find(w=>w.some(x=>tdk(x)===dk))||[];
      const daySlots=slots[dow]||[];
      // ① 1日8時間超の解消（過剰枠から優先して外す）
      staff.forEach(s=>{
        let g=0;
        while(dh(dk,s.id)>DAILY_LIMIT && g++<12){
          const mine=daySlots.filter(sl=>activeIds(dk,sl.id).includes(s.id));
          if(mine.length<=1)break; // 1コマだけなら外すと0勤務になるので残す
          const cand=mine.filter(sl=>!wouldGap(dk,sl,dow,s.id));
          if(cand.length===0)break;
          const score=sl=>{
            const over=activeCount(dk,sl.id)>getReq(dk,sl.id)?1:0;
            const trial={...na,[dk]:{...na[dk],[sl.id]:(na[dk][sl.id]||[]).filter(x=>x!==s.id)}};
            return over*1000 + (dh(dk,s.id)-dh(dk,s.id,trial)); // 過剰枠優先・削減量大きい順
          };
          cand.sort((a,b)=>score(b)-score(a));
          drop(dk,cand[0].id,s.id);
        }
      });
      // ② 定員オーバーの枠を整理（重複者を外す。週最低時間を割らない範囲で）
      let guard=0, changed=true;
      while(changed && guard++<40){
        changed=false;
        for(const B of daySlots){
          const req=getReq(dk,B.id);
          if(activeCount(dk,B.id)<=req)continue;
          const cands=activeIds(dk,B.id).filter(sid=>numSlots(dk,dow,sid)>1 && !wouldGap(dk,B,dow,sid));
          // 週の最低時間を割らない人を優先
          const safe=cands.filter(sid=>{
            const wh=parseWeeklyHours((staff.find(x=>x.id===sid)||{}).notes);
            if(!(wh&&wh.min>0))return true;
            const trial={...na,[dk]:{...na[dk],[B.id]:(na[dk][B.id]||[]).filter(x=>x!==sid)}};
            const wk=week.reduce((a,d3)=>a+dh(tdk(d3),sid,trial),0);
            return wk>=wh.min;
          });
          if(safe.length===0)continue; // 全員が最低時間を割る → そのコマは触らない
          safe.sort((a,b)=>dh(dk,b)-dh(dk,a)); // 勤務時間が多い人から外す
          drop(dk,B.id,safe[0]);
          changed=true;
        }
      }
    });
    return na;
  }
  // ── 拘束時間の最小化（コマ入れ替え最適化 / 2-opt）──
  // 同じ人に時間が離れたコマ（例：午前＋夜）が割り当たると拘束時間（最初〜最後の幅）が
  // 伸びて残業になる。これを「2人のコマを交換」して各人の span 合計が縮むなら入れ替える。
  // 交換なので各コマの人数・スキル種別は不変。ベースシフト/有給/希望休/手動除外は動かさない。
  function compactDaySpans(rawAsgn){
    const na={};
    Object.entries(rawAsgn||{}).forEach(([dk,sm])=>{na[dk]={};Object.entries(sm).forEach(([slotId,ids])=>{na[dk][slotId]=[...(ids||[])];});});
    const isOffOrExcl=(dk,slotId,sid)=>{
      if((manualExclusions[dk]?.[slotId]||[]).includes(sid))return true;
      const tc=tmps[dk]?.[String(sid)];
      return !!(tc&&['off','paid','paid_am','paid_pm'].includes(tc.type));
    };
    // ベースシフトは「その日に誰が働くか・各人の勤務時間」を固定する意味。
    // 入れ替え(swap)は同種コマ間で2人を交換するだけなので、出勤者と勤務時間は不変。
    // 座る外来コマが午前⇄昼⇄夜で入れ替わるだけなので、ベース固定とは矛盾しない。
    // → ベース登録の有無で入れ替えを禁止しない（type一致とcanCoverSlotでスキルは担保）。
    const OT=100; // 残業1hあたりのペナルティ（残業を作る入れ替えは必ずコスト増→不採用に）
    const personCost=(dk,sid,state)=>{
      const h=dayHours(dk,sid,state,manualExclusions,slots,staff);
      return h + (h>DAILY_LIMIT ? (h-DAILY_LIMIT)*OT : 0);
    };
    dates.forEach(d=>{
      const dk=tdk(d); if(isClosedDay(dk)||!na[dk])return;
      const dow=d.getDay();
      const week=weeks.find(w=>w.some(x=>tdk(x)===dk))||[];
      const daySlots=slots[dow]||[];
      let guard=0, improved=true;
      while(improved && guard++<60){
        improved=false;
        for(let i=0;i<daySlots.length && !improved;i++){
          for(let j=0;j<daySlots.length && !improved;j++){
            const A=daySlots[i], B=daySlots[j];
            if(A.id===B.id)continue;
            if(A.type!==B.type)continue; // 同種コマ間のみ（スキル安全）
            const aIds=(na[dk][A.id]||[]).filter(sid=>!isOffOrExcl(dk,A.id,sid));
            const bIds=(na[dk][B.id]||[]).filter(sid=>!isOffOrExcl(dk,B.id,sid));
            for(const x of aIds){
              if((na[dk][B.id]||[]).includes(x))continue;   // 既にBにいる
              const sx=staff.find(s=>s.id===x); if(!sx||isBaseOnly(sx)||!canCoverSlot(sx,B,dow))continue;
              for(const y of bIds){
                if(y===x)continue;
                if((na[dk][A.id]||[]).includes(y))continue;
                const sy=staff.find(s=>s.id===y); if(!sy||isBaseOnly(sy)||!canCoverSlot(sy,A,dow))continue;
                // x↔y の交換を試算
                const trial={...na,[dk]:{...na[dk],
                  [A.id]:(na[dk][A.id]||[]).map(z=>z===x?y:z),
                  [B.id]:(na[dk][B.id]||[]).map(z=>z===y?x:z)}};
                const before=personCost(dk,x,na)+personCost(dk,y,na);
                const after =personCost(dk,x,trial)+personCost(dk,y,trial);
                if(after < before-1e-6){
                  // 週上限を悪化させない
                  let wkOK=true;
                  if(week.length>0){
                    for(const sid of [x,y]){
                      const so=(sid===x)?sx:sy;
                      const wh=parseWeeklyHours(so.notes);
                      if(wh&&wh.max>0){
                        const wkH=week.reduce((s2,d3)=>s2+dayHours(tdk(d3),sid,trial,manualExclusions,slots,staff),0);
                        if(wkH>Math.min(wh.max,WEEKLY_LIMIT)){wkOK=false;break;}
                      }
                    }
                  }
                  if(wkOK){
                    na[dk][A.id]=trial[dk][A.id];
                    na[dk][B.id]=trial[dk][B.id];
                    improved=true; break;
                  }
                }
              }
              if(improved)break;
            }
          }
        }
      }
    });
    return na;
  }
  function applySpanCompaction(){
    const beforeAsgn=asgn;
    const fixed=enforceBaseOnly(compactDaySpans(asgn));
    const nameOf=id=>(staff.find(s=>s.id===id)||{}).name||('ID'+id);
    const changes=[];
    dates.forEach(d=>{
      const dk=tdk(d); if(isClosedDay(dk))return;
      const dow=d.getDay();
      (slots[dow]||[]).forEach(slot=>{
        const b=(beforeAsgn[dk]?.[slot.id]||[]);
        const a=(fixed[dk]?.[slot.id]||[]);
        const removed=b.filter(id=>!a.includes(id));
        const added=a.filter(id=>!b.includes(id));
        if(removed.length||added.length){
          changes.push({dk,slotId:slot.id,slotLabel:slot.label,m:d.getMonth()+1,day:d.getDate(),dow,
            removed:removed.map(id=>({id,name:nameOf(id)})), added:added.map(id=>({id,name:nameOf(id)}))});
        }
      });
    });
    if(changes.length===0){alert('入れ替えで短縮できる拘束時間はありませんでした。');return;}
    setPreReliefAsgn(beforeAsgn);
    setReliefChanges(changes);
    setAsgn(fixed);
    pushEventLog('拘束時間を最適化');
    alert('拘束時間を最適化しました（入れ替え '+changes.length+'件）。\n各人の勤務が時間的に連続するようコマを入れ替えています。\n変更点は表の上に一覧表示され、移動先には ✦ が付きます。\n「元に戻す」で取り消せます。');
  }
  // ── 無人帯ゼロ最適化：コマ終盤などが0名になるとき、別コマの人と「入れ替え」て解消する ──
  // 例: 午後手術(〜19時)に18時退勤の人だけ→18-19が無人。19時までいられる人が別の手術/外来コマにいれば入れ替える。
  // 既存のfixCoverageGapsは同種コマ内の移動のみだが、こちらは両方できる人なら外来↔手術もまたいで入れ替える。
  function swapForEndCoverage(rawAsgn){
    const na={};
    Object.entries(rawAsgn||{}).forEach(([dk,sm])=>{na[dk]={};Object.entries(sm).forEach(([slotId,ids])=>{na[dk][slotId]=[...(ids||[])];});});
    const isOffOrExcl=(dk,slotId,sid)=>{
      if((manualExclusions[dk]?.[slotId]||[]).includes(sid))return true;
      const tc=tmps[dk]?.[String(sid)];
      return !!(tc&&['off','paid','paid_am','paid_pm'].includes(tc.type));
    };
    const activeIds=(dk,slotId)=>(na[dk]?.[slotId]||[]).filter(sid=>!isOffOrExcl(dk,slotId,sid));
    const sObj=sid=>staff.find(x=>x.id===sid);
    const skillOK=(sid,slot)=>{const s=sObj(sid);if(!s)return false;const sk=staffSkill(s);if(slot.type==='out'&&sk==='surg')return false;if(slot.type==='surg'&&sk==='out')return false;return true;};
    const slotGap=(da,dk,slot,dow)=>{const r=slotRangeMin(slot);if(!r||r.s==null)return null;const iv=(da[slot.id]||[]).filter(sid=>!isOffOrExcl(dk,slot.id,sid)).map(sid=>staffPresenceInSlot(sObj(sid),slot,dow,da,manualExclusions[dk])).filter(Boolean);return firstUncoveredBand(r,iv);};
    // v105: 無人帯ゼロを最優先。この入れ替えは無人帯解消のためだけに走るので、本人の「希望」週上限
    // (wh.max=「○時間以内」等)はソフト扱いにして超過を許す（例: 上限20hの大滝を午後手術に入れ24hでも可）。
    // ただし「1日8時間(DAILY_LIMIT)」と「法定相当の週上限 WEEKLY_LIMIT(40h)」は引き続き厳守する。
    const dayWeekOK=(dk,sid,trial,week)=>{
      if(dayHours(dk,sid,trial,manualExclusions,slots,staff)>DAILY_LIMIT)return false;
      if(week.length>0){const wkH=week.reduce((a,d3)=>a+dayHours(tdk(d3),sid,trial,manualExclusions,slots,staff),0);if(wkH>WEEKLY_LIMIT)return false;}
      return true;
    };
    dates.forEach(d=>{
      const dk=tdk(d); if(isClosedDay(dk)||!na[dk])return;
      const dow=d.getDay(); const week=weeks.find(w=>w.some(x=>tdk(x)===dk))||[];
      const daySlots=slots[dow]||[];
      daySlots.forEach(B=>{
        if(getReq(dk,B.id)<=0)return;
        let guard=0;
        while(guard++<6){
          const gap=slotGap(na[dk],dk,B,dow); if(!gap)break;
          let done=false;
          for(const A of daySlots){
            if(A.id===B.id)continue;
            const aWasCovered=!slotGap(na[dk],dk,A,dow);
            for(const Y of activeIds(dk,A.id)){
              if(isBaseOnly(sObj(Y))||(na[dk][B.id]||[]).includes(Y)||!skillOK(Y,B))continue;
              const pY=staffPresenceInSlot(sObj(Y),B,dow,na[dk],manualExclusions[dk]);
              if(!(pY&&pY.s<=gap.s&&pY.e>=gap.e))continue; // Yが無人帯をカバーできる
              for(const X of activeIds(dk,B.id)){
                if(X===Y||isBaseOnly(sObj(X))||(na[dk][A.id]||[]).includes(X)||!skillOK(X,A))continue;
                const newA=(na[dk][A.id]||[]).map(z=>z===Y?X:z);
                const newB=(na[dk][B.id]||[]).map(z=>z===X?Y:z);
                const trial={...na,[dk]:{...na[dk],[A.id]:newA,[B.id]:newB}};
                const okB=!slotGap(trial[dk],dk,B,dow);
                const okA=!slotGap(trial[dk],dk,A,dow);
                if(okB && (okA || !aWasCovered) && dayWeekOK(dk,X,trial,week) && dayWeekOK(dk,Y,trial,week)){
                  na[dk][A.id]=newA; na[dk][B.id]=newB; done=true; break;
                }
              }
              if(done)break;
            }
            if(done)break;
          }
          if(!done)break;
        }
      });
    });
    return na;
  }
  function applyOvertimeRelief(){
    const beforeAsgn=asgn;
    // ①勤務不可/半分も出られないコマから除去 → ②偏り調整 → ③超過勤務の調整 → ④無人(0名)解消 → ⑤入れ替えで端の無人帯解消 → ⑥過剰配置・8時間超トリム
    const fixed=enforceBaseOnly(trimOverstaff(swapForEndCoverage(fixCoverageGaps(relieveDailyOvertime(rebalanceDayCoverage(dropPoorCoverage(asgn)))))));
    // 変更点の差分を作成（コマ単位で 外れた人／入った人）
    const nameOf=id=>(staff.find(s=>s.id===id)||{}).name||('ID'+id);
    const changes=[];
    dates.forEach(d=>{
      const dk=tdk(d); if(isClosedDay(dk))return;
      const dow=d.getDay();
      (slots[dow]||[]).forEach(slot=>{
        const b=(beforeAsgn[dk]?.[slot.id]||[]);
        const a=(fixed[dk]?.[slot.id]||[]);
        const removed=b.filter(id=>!a.includes(id));
        const added=a.filter(id=>!b.includes(id));
        if(removed.length||added.length){
          changes.push({dk,slotId:slot.id,slotLabel:slot.label,m:d.getMonth()+1,day:d.getDate(),dow,
            removed:removed.map(id=>({id,name:nameOf(id)})), added:added.map(id=>({id,name:nameOf(id)}))});
        }
      });
    });
    if(changes.length===0){alert('調整対象（無人時間帯・配置の偏り・8時間超）はありませんでした。');return;}
    setPreReliefAsgn(beforeAsgn);
    setReliefChanges(changes);
    setAsgn(fixed);
    pushEventLog('配置を自動調整');
    let over=0;
    dates.forEach(d=>{const dk=tdk(d);if(isClosedDay(dk))return;staff.forEach(s=>{if(dayHours(dk,s.id,fixed,manualExclusions,slots,staff)>DAILY_LIMIT)over++;});});
    alert('配置の自動調整を行いました（無人時間帯の解消・偏り・超過勤務／変更 '+changes.length+'件）。\n変更点は表の上に一覧表示され、追加された人には ✦ が付きます。\n「元に戻す」で取り消せます。'+(over>0?'\n\n※まだ解消できない超過が'+over+'件あります（延長できる人がいない枠）。':''));
  }
  function undoOvertimeRelief(){

    setPreReliefAsgn(null);
    setReliefChanges([]);
  }
  // 自動調整で「追加された」配置の集合（バッジ強調用）
  const reliefAddedSet=useMemo(()=>{

  },[reliefChanges]);

  // ── ベースシフトのコマ被覆を保証（時間調整で消えた金土などを最後に復活）──
  // 労働時間調整(enforceHourLimits)が週後半の枠を削って金・土が空になるのを防ぐため、
  // ベースシフトで指定されたスタッフを各開院日のコマに必ず再充当する。
  function ensureBaseCoverage(rawAsgn){
    const na={};
    Object.entries(rawAsgn).forEach(([dk,sm])=>{na[dk]={};Object.entries(sm).forEach(([slotId,ids])=>{na[dk][slotId]=[...(ids||[])];});});
    const hasBase=['A','B'].some(p=>Object.keys(baseShift[p]||{}).length>0);
    if(!hasBase)return na; // ベースシフト未設定なら何もしない
    dates.forEach(d=>{
      const dk=tdk(d);
      if(isClosedDay(dk))return;
      const dow=d.getDay();
      const pattern=getABPatternForDate(d);
      const baseForDay=(baseShift[pattern]||{})[dow]||{};
      (slots[dow]||[]).forEach(slot=>{
        const baseIds=(baseForDay[slot.id]||[]).filter(sid=>staff.some(s=>s.id===sid));
        if(baseIds.length===0)return;
        if(!na[dk])na[dk]={};
        let cur=na[dk][slot.id]||[];
        baseIds.forEach(sid=>{
          if(cur.includes(sid))return; // すでに入っている
          if((manualExclusions[dk]?.[slot.id]||[]).includes(sid))return; // 手動除外は尊重
          const tc=tmps[dk]?.[String(sid)];
          if(tc&&['off','paid','paid_am','paid_pm'].includes(tc.type))return; // 休み/有給は尊重
          // 1日の労働上限を超える場合は入れない（物理的に不可能な日を避ける）
          if(dayHours(dk,sid,na,manualExclusions,slots)+slotHours(dow,slot.id,slots)>DAILY_LIMIT)return;
          cur=[...cur,sid];
          na[dk][slot.id]=cur;
        });
      });
    });
    return na;
  }

  function applyPat(pat){

        if(!na[dk])na[dk]={};
        Object.entries(patSlots).forEach(([slotId,sids])=>{
          const aiIds=(Array.isArray(sids)?sids:[]).filter(sid=>staff.some(s=>s.id===sid));
          const existing=na[dk][slotId]||[];
          const merged=[...existing];
          aiIds.forEach(sid=>{if(!merged.includes(sid))merged.push(sid);});
          na[dk][slotId]=merged;
        });
      });
      setAsgn(enforceBaseOnly(finalizeAsgn(na)));
      setApid(pat.id);
      setManualExclusions({});
    } else {
      const na={};
      Object.entries(pat.assign||{}).forEach(([mmdd,sls])=>{
        const dk=y+'-'+mmdd;na[dk]={};
        Object.entries(sls).forEach(([s2,sids])=>{

  // ── アイコン設定／打刻修正の申告（クラウドの requests_data 包みに保存）──

  async function flushStaffToCloud(){

  const staffUnread=useMemo(()=>{

  useEffect(()=>{

    if(!tmpType||!slot)return false;
    if(tmpType==='off'||tmpType==='paid')return true;
    const id=slot.id||'', label=slot.label||'';
    if(tmpType==='paid_am')return ['am_out','am_surg','surg'].includes(id)||label.includes('午前');
    if(tmpType==='paid_pm')return ['pm_surg','pm_out','pm1','pm2'].includes(id)||label.includes('午後')||label.includes('昼')||label.includes('夜');

    const tmpType=tmp?.type;
    return(slots[dow]||[]).filter(slot=>{
      if(!(dayAsgn[slot.id]||[]).includes(sid))return false;
      if((dayExcl[slot.id]||[]).includes(sid))return false;
      if(isStaffOffForSlotInStaffView(tmpType,slot))return false;

      const day={...(prev[dk]||{})};
      day[String(staffMyId)]={type:'work_wish',slots:slotIds,slotLabels,appliedAt:new Date().toISOString()};

    return staff.find(x=>String(x.code||'')===code)||staff.find(x=>String(x.id||'')===code)||staff.find(x=>String(x.name||'')===String(c&&c.staffName||''));

  function correctionAssessment(c){
    const st=staffByCorrection(c);
    if(!st)return {cls:'ng',label:'NG候補',msg:'スタッフID/コードを特定できません'};
    const dk=c.date;
    const d=new Date(dk);
    if(!dk||isNaN(d))return {cls:'ng',label:'NG候補',msg:'対象日が不明です'};
    const dow=d.getDay();
    const dayAsgn=asgn[dk]||{};
    const daySlots=slots[dow]||[];
    const assigned=daySlots.filter(sl=>((dayAsgn[sl.id]||[]).map(String)).includes(String(st.id)));
    if(!assigned.length)return {cls:'ng',label:'NG候補',msg:'この日の予定シフトが見つかりません'};
    let minS=99999,maxE=-1;
    assigned.forEach(sl=>{const r=slotRangeMin(sl);if(r&&r.s!=null&&r.e!=null){if(r.s<minS)minS=r.s;if(r.e>maxE)maxE=r.e;}});
    if(maxE<0)return {cls:'warn',label:'要確認',msg:'予定シフトの時間帯を判定できません'};
    const vals=[];
    if(c.newIn)vals.push({kind:'出勤',v:hmToMin(c.newIn)});
    if(c.newOut)vals.push({kind:'退勤',v:hmToMin(c.newOut)});
    const bad=vals.filter(x=>x.v==null||x.v<minS-30||x.v>maxE+60);
    if(bad.length)return {cls:'warn',label:'要確認',msg:`申請時刻が予定勤務帯 ${fmtHM(minS)}〜${fmtHM(maxE)} から外れています`};
    return {cls:'ok',label:'OK',msg:`予定勤務帯 ${fmtHM(minS)}〜${fmtHM(maxE)} の範囲内です`};
  }

  function ymOfDk(dk){
    const s=String(dk||'').trim();
    if(/^\d{4}-\d{2}/.test(s))return s.slice(0,7);
    if(/^\d{4}\/\d{1,2}/.test(s)){const p=s.split('/');return p[0]+'-'+String(p[1]).padStart(2,'0');}
    const d=new Date(s);
    if(!isNaN(d))return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
    return '';
  }

  function collectStaffMessageReports(visibleOnly){
    const reports=[];
    Object.entries(requests||{}).forEach(([dk,dayMap])=>{
      Object.entries(dayMap||{}).forEach(([key,r])=>{
        if(!r||r.type!=='mistake_report')return;
        if(isReqTombed(dk,key))return;
        if(visibleOnly&&!requestVisible(dk,!r.resolved))return;
        reports.push({dk,key,r});
      });
    });
    reports.sort((a,b)=>((a.r.createdAt||'')<(b.r.createdAt||'')?1:-1));

  function staffFullNameForExport(st,fallback){
    if(st){
      const full=String(st.fullName||'').trim();
      if(full)return full;
      const nm=String(st.name||'').trim();
      const code=String(st.code||'').trim();
      return code?nm+'（ID:'+code+'）':nm;

    return String(fallback||'');

  function collectRequestRows(ym){
    const rows=[];
    const mark={};
    const targetOk=dk=>!ym||ymOfDk(dk)===ym;
    const push=row=>{ rows.push(row); if(row.staffId!=null)mark[String(row.dk)+'|'+String(row.staffId)]=1; };
    Object.entries(requests||{}).forEach(([dk,dayMap])=>{
      if(!targetOk(dk))return;
      Object.entries(dayMap||{}).forEach(([key,r])=>{
        if(!r)return;
        let type='',status='',detail='',name='';
        const sid=parseInt(key);
        const st=staff.find(x=>x.id===sid);
        if(['paid_full','paid_am','paid_pm','off'].includes(r.type)){
          type=r.type==='off'?'休み申請':'有給申請';
          const applied=tmps?.[dk]?.[String(sid)]?.type;
          status=applied?'反映済み':'未反映';
          detail=(REQ_TYPES[r.type]?.label||r.type);
          name=staffFullNameForExport(st,r.staffName||key);
        }else if(r.type==='work_wish'){
          type='出勤希望の挙手';
          status=r.decision==='approved'?'承認済み':r.decision==='rejected'?'却下済み':'未対応';
          detail=(r.slotLabels||r.slots||[]).join('・');
          name=staffFullNameForExport(st,r.staffName||key);
        }else if(r.type==='mistake_report'){
          type='管理者へのメッセージ';
          status=r.resolved?'対応済み':'未対応';
          detail=r.text||'';
          name=staffFullNameForExport(st,r.staffName||key);
        }else return;
        push({dk,staffId:isNaN(sid)?null:sid,name,type,status,detail,at:r.appliedAt||r.createdAt||r.decidedAt||''});
      });
    });

    // 旧データ・管理者直接反映データの補完: requests 側に残っていない有給履歴もPDFに出す
    (staff||[]).forEach(s=>{
      const pl=paidLeave?.[s.id]||{history:[]};
      (pl.history||[]).forEach(r=>{
        const dk=r.dk||r.date||'';
        if(!targetOk(dk))return;
        const k=String(dk)+'|'+String(s.id);
        if(mark[k])return;
        const unit=r.unit==='full'?'全日':r.unit==='am'?'午前半日':r.unit==='pm'?'午後半日':(r.unit||'有給');
        push({
          dk,
          staffId:s.id,
          name:staffFullNameForExport(s,s.name),
          type:'有給履歴',
          status:'反映済み',
          detail:unit+'（反映済みデータから表示）',
          at:r.appliedAt||''
        });
      });
    });

    // tmps 側に残っている休み・有給も補完する
    Object.entries(tmps||{}).forEach(([dk,dayMap])=>{
      if(!targetOk(dk))return;
      Object.entries(dayMap||{}).forEach(([sidStr,cond])=>{
        if(!cond||!['paid','paid_am','paid_pm','off'].includes(cond.type))return;
        const sid=parseInt(sidStr);
        const k=String(dk)+'|'+String(sid);
        if(mark[k])return;
        const s=staff.find(x=>String(x.id)===String(sidStr));
        const label=cond.type==='off'?'希望休':cond.type==='paid'?'有給（全日）':cond.type==='paid_am'?'有給（午前半日）':'有給（午後半日）';
        push({
          dk,
          staffId:isNaN(sid)?null:sid,
          name:staffFullNameForExport(s,sidStr),
          type:cond.type==='off'?'休み履歴':'有給履歴',
          status:'反映済み',
          detail:label+'（シフト反映済みデータから表示）',
          at:cond.appliedAt||''
        });
      });
    });

    (corrections||[]).forEach(c=>{
      if(ym&&ymOfDk(c.date)!==ym)return;
      rows.push({
        dk:c.date||'',
        staffId:null,
        name:staffFullNameForExport(staffByCorrection(c),c.staffName||c.code||''),
        type:'打刻修正申請',
        status:correctionStatusLabel(c),
        detail:'出 '+(c.newIn||'—')+' / 退 '+(c.newOut||'—')+'　理由: '+(c.reason||'—')+(c.note?'　補足: '+c.note:''),
        at:c.appliedAt||c.decidedAt||''
      });
    });
    rows.sort((a,b)=>String(a.dk).localeCompare(String(b.dk))||String(a.type).localeCompare(String(b.type))||String(a.name).localeCompare(String(b.name)));
    return rows;
  }

      });
      h+='</tbody></table>';
    }
    h+='<div class="note">「申請対象日」は休み・有給・出勤希望・打刻修正などの対象日です。「申請日」はスタッフが申請した日時または管理者が処理した日時です。<br>この画面はブラウザの印刷機能からPDF保存できます。Windows/Macでは「印刷」→「PDFとして保存」を選んでください。税理士・社労士へ送る場合は、保存したPDFをメールに添付してください。</div>';
    h+='</body></html>';
    w.document.open();w.document.write(h);w.document.close();
    setTimeout(()=>{try{w.focus();}catch(_){ }},200);
  }

// ================================================================
// 当月のA/Bパターン割当プレビュー
// ================================================================
function CurrentMonthPatternPreview({y,m}){
  // 当月の各週の月曜日を取得し、A/Bを表示
  function getABPattern(d){
    const year=d.getFullYear();
    const jan1=new Date(year,0,1);
    const dayOfWeek=jan1.getDay();
    const daysToMonday=dayOfWeek===0?-6:(1-dayOfWeek);
    const firstMon=new Date(jan1);
    firstMon.setDate(jan1.getDate()+daysToMonday);
    const diffDays=Math.floor((d-firstMon)/(1000*60*60*24));
    const weekIdx=Math.floor(diffDays/7);
    return weekIdx%2===0?'A':'B';
  }
  const dates=[];
  const d=new Date(y,m-1,1);
  while(d.getMonth()===m-1){
    if(d.getDay()===1) dates.push(new Date(d));
    d.setDate(d.getDate()+1);
  }
  // 月の最初の週も拾う（月初が月曜以外の場合）
  if(dates.length===0||dates[0].getDate()>1){
    dates.unshift(new Date(y,m-1,1));
  }

  return(
    <div style={{background:K.bgS,border:K.bd,borderRadius:K.rmd,padding:'8px 12px',marginBottom:12,display:'flex',flexWrap:'wrap',gap:8,alignItems:'center'}}>
      <span style={{fontSize:11,fontWeight:600,color:K.textS}}>{y}年{m}月の割当:</span>
      {dates.map((wkStart,i)=>{
        const pat=getABPattern(wkStart);
        const wkEnd=new Date(wkStart);wkEnd.setDate(wkStart.getDate()+5);
        if(wkEnd.getMonth()!==m-1){wkEnd.setMonth(m-1);wkEnd.setDate(new Date(y,m,0).getDate());}
        return(
          <span key={i} style={{fontSize:11,padding:'2px 8px',borderRadius:4,
            background:pat==='A'?'#DBEAFE':'#FCE7F3',
            color:pat==='A'?'#1E40AF':'#9D174D',
            fontWeight:500}}>
            {wkStart.getMonth()+1}/{wkStart.getDate()}〜 = {pat}
          </span>
        );
      })}
    </div>
  );
}

// ================================================================
const DOW_NAME_TO_NUM = {
  '月':1,'月曜':1,'月曜日':1,
  '火':2,'火曜':2,'火曜日':2,
  '水':3,'水曜':3,'水曜日':3,
  '木':4,'木曜':4,'木曜日':4,
  '金':5,'金曜':5,'金曜日':5,
  '土':6,'土曜':6,'土曜日':6,
};
const DOW_NUM_TO_NAME = {1:'月',2:'火',3:'水',4:'木',5:'金',6:'土'};

// 人間可読JSON → 内部baseShift構造に変換
function convertHumanReadableToBaseShift(data, staff, slots){
  const result={
    baseShift:{A:{},B:{}},
    assignmentCount:0,
    aCount:0,
    bCount:0,
    warnings:[],
    errors:[],
  };

  // 既に内部構造形式（A: {1: {am_out: [1,2]}}）の場合はそのまま使用
  function isInternalFormat(d){
    if(!d||typeof d!=='object')return false;
    const a=d.A||d.baseShift?.A;
    if(!a||typeof a!=='object')return false;
    // キーが数値の文字列なら内部形式
    return Object.keys(a).some(k=>/^[1-6]$/.test(k));
  }

  const source=data.patterns||data.baseShift||data;

  if(isInternalFormat(data)){
    // 既に内部形式の場合は staff.id, slot.id をそのまま使う想定
    ['A','B'].forEach(pat=>{
      const patData=source[pat]||{};
      Object.entries(patData).forEach(([dowKey,slotMap])=>{
        const dow=parseInt(dowKey);
        if(isNaN(dow))return;
        result.baseShift[pat][dow]={};
        Object.entries(slotMap||{}).forEach(([slotId,ids])=>{
          if(Array.isArray(ids)){
            const validIds=ids.filter(id=>staff.some(s=>s.id===id));
            if(validIds.length>0){
              result.baseShift[pat][dow][slotId]=validIds;
              result.assignmentCount+=validIds.length;
              if(pat==='A')result.aCount+=validIds.length;
              else result.bCount+=validIds.length;
            }
          }
        });
      });
    });
    return result;
  }

  // 人間可読フォーマットの処理
  // 期待: data.patterns = { A: { pattern_name: ..., shifts: { 月: { 午前外来: ["北尾","北口"] } } }, B: {...} }
  // または data.A = {...}, data.B = {...}
  // または data = { A: { shifts: {...} }, B: { shifts: {...} } }

  // スタッフ名 → ID マッピング（括弧書きや（前半担当）などのサフィックスを除去）
  function resolveStaffId(nameStr){
    if(typeof nameStr!=='string')return null;
    // 括弧書きを除去：「杉本（前半担当）」「北尾（月1回）」「小田（17:30-18:00のみ）」など
    let cleanName=nameStr.replace(/[（(].*?[）)]/g,'').trim();
    if(!cleanName)return null;
    const match=staff.find(s=>s.name===cleanName);
    if(match)return match.id;
    // 部分一致もトライ
    const partial=staff.find(s=>cleanName.includes(s.name)||s.name.includes(cleanName));
    if(partial){
      result.warnings.push(`スタッフ名「${nameStr}」を「${partial.name}」として解釈しました`);
      return partial.id;
    }
    return null;
  }

  // コマラベル → スロットID マッピング
  function resolveSlotId(label, dow){
    if(typeof label!=='string')return null;
    const slotsForDow=slots[dow]||[];
    // 完全一致
    const exact=slotsForDow.find(sl=>sl.label===label);
    if(exact)return exact.id;
    // IDが直接書かれている場合
    const byId=slotsForDow.find(sl=>sl.id===label);
    if(byId)return byId.id;
    // 部分一致
    const partial=slotsForDow.find(sl=>label.includes(sl.label)||sl.label.includes(label));
    if(partial){
      result.warnings.push(`コマ名「${label}」(${DOW_NUM_TO_NAME[dow]}曜)を「${partial.label}」として解釈しました`);
      return partial.id;
    }
    return null;
  }

  function processPattern(pat, patData){
    if(!patData)return;
    const shifts=patData.shifts||patData;
    result.baseShift[pat]={};
    Object.entries(shifts).forEach(([dowKey,slotMap])=>{
      // dowKeyは「月」「火」など、または数値1-6
      let dow=DOW_NAME_TO_NUM[dowKey];
      if(!dow){
        const n=parseInt(dowKey);
        if(!isNaN(n)&&n>=1&&n<=6)dow=n;
      }
      if(!dow){
        result.warnings.push(`曜日「${dowKey}」を解釈できませんでした`);
        return;
      }
      result.baseShift[pat][dow]={};
      Object.entries(slotMap||{}).forEach(([slotLabel,nameList])=>{
        const slotId=resolveSlotId(slotLabel,dow);
        if(!slotId){
          result.warnings.push(`${DOW_NUM_TO_NAME[dow]}曜の「${slotLabel}」コマが見つかりません`);
          return;
        }
        if(!Array.isArray(nameList)){
          // 「松枝」のような単一文字列にも対応
          if(typeof nameList==='string')nameList=[nameList];
          else return;
        }
        const sids=[];
        nameList.forEach(name=>{
          if(name==='—'||name==='-'||!name)return;
          const sid=resolveStaffId(name);
          if(sid){
            sids.push(sid);
          }else{
            result.warnings.push(`${DOW_NUM_TO_NAME[dow]}曜・${slotLabel}: スタッフ「${name}」が見つかりません`);
          }
        });
        if(sids.length>0){
          result.baseShift[pat][dow][slotId]=sids;
          result.assignmentCount+=sids.length;
          if(pat==='A')result.aCount+=sids.length;
          else result.bCount+=sids.length;
        }
      });
    });
  }

  // パターンの抽出
  const aPat=source.A||source.a||(data.patterns?.A);
  const bPat=source.B||source.b||(data.patterns?.B);
  if(!aPat&&!bPat){
    result.errors.push('AパターンもBパターンも見つかりません。JSONフォーマットを確認してください。');
    return result;
  }
  if(aPat)processPattern('A',aPat);
  if(bPat)processPattern('B',bPat);

  return result;
}

// 内部baseShift構造 → 人間可読JSONに変換
function convertBaseShiftToHumanReadable(baseShift, staff, slots){
  const result={
    version:'CL-2 Human Readable',
    exportedAt:new Date().toISOString(),
    patterns:{A:{shifts:{}},B:{shifts:{}}},
  };
  ['A','B'].forEach(pat=>{
    const patData=baseShift[pat]||{};
    [1,2,3,4,5,6].forEach(dow=>{
      const dayMap=patData[dow]||{};
      const dayName=DOW_NUM_TO_NAME[dow];
      const dayShifts={};
      (slots[dow]||[]).forEach(slot=>{
        const ids=dayMap[slot.id]||[];
        if(ids.length===0)return;
        const names=ids.map(id=>{
          const s=staff.find(x=>x.id===id);
          return s?s.name:`(ID:${id})`;
        });
        dayShifts[slot.label]=names;
      });
      if(Object.keys(dayShifts).length>0){
        result.patterns[pat].shifts[dayName]=dayShifts;
      }
    });
  });
  return result;
}

function BaseShiftTab({staff,slots,baseShift,setBaseShift,setBaseSlotStaff,toggleBaseSlotStaff,applyBaseShiftToMonth,y,m}){
  const [activePattern,setActivePattern]=useState('A');
  const dows=[1,2,3,4,5,6];

  // ── ベースシフトJSON取込 ──
  function handleImportBaseShift(e){
    const file=e.target.files?.[0];
    if(!file){return;}
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        // 取込結果集計用
        const result=convertHumanReadableToBaseShift(data,staff,slots);
        if(result.errors.length>0&&result.assignmentCount===0){
          alert('取込に失敗しました:\n'+result.errors.slice(0,10).join('\n'));
          return;
        }
        // 確認ダイアログ
        let msg=`ベースシフトを取り込みます。\n\n`;
        msg+=`A週: ${result.aCount}コマ配置\n`;
        msg+=`B週: ${result.bCount}コマ配置\n`;
        msg+=`合計: ${result.assignmentCount}コマ\n`;
        if(result.warnings.length>0){
          msg+=`\n警告 (${result.warnings.length}件):\n`+result.warnings.slice(0,5).join('\n');
          if(result.warnings.length>5){msg+=`\n...他${result.warnings.length-5}件`;}
        }
        msg+='\n\n既存のベースシフトは上書きされます。よろしいですか？';
        if(window.confirm(msg)){
          setBaseShift(result.baseShift);
          alert(`ベースシフトを取り込みました（${result.assignmentCount}コマ）`);
        }
      }catch(err){
        alert('取込に失敗しました: '+err.message);
      }
    };
    reader.readAsText(file);
    e.target.value='';
  }

  // ── ベースシフトJSONエクスポート ──
  function handleExportBaseShift(){
    const exportData=convertBaseShiftToHumanReadable(baseShift,staff,slots);
    const json=JSON.stringify(exportData,null,2);
    const blob=new Blob([json],{type:'application/json'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download=`base_shift_${y}${String(m).padStart(2,'0')}.json`;
    a.click();
    URL.revokeObjectURL(a.href);
  }

  function handleApply(){
    if(window.confirm(`ベースシフトを ${y}年${m}月 に展開します。\nすでに割り当てられている日はスキップされ、空いている日のみベースシフトが適用されます。よろしいですか？`)){
      const count=applyBaseShiftToMonth();
      alert(`${count}日にベースシフトを適用しました。`);
    }
  }

  function handleClear(){
    if(window.confirm(`パターン${activePattern}のベースシフトをすべてクリアしますか？`)){
      dows.forEach(dow=>{
        (slots[dow]||[]).forEach(slot=>{
          setBaseSlotStaff(activePattern,dow,slot.id,[]);
        });
      });
    }
  }

  // パターン間でコピー
  function copyPattern(from,to){
    if(window.confirm(`パターン${from}の内容をパターン${to}にコピーしますか？\nパターン${to}の既存内容は上書きされます。`)){
      const src=baseShift[from]||{};
      dows.forEach(dow=>{
        (slots[dow]||[]).forEach(slot=>{
          const sids=src[dow]?.[slot.id]||[];
          setBaseSlotStaff(to,dow,slot.id,[...sids]);
        });
      });
    }
  }

  return(
    <div style={{padding:16}}>
      {/* ── 説明ガイド ── */}
      <div style={{background:'#EFF6FF',border:'1px solid #BFDBFE',borderRadius:K.rlg,padding:14,marginBottom:16}}>
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
          <span style={{fontSize:14}}>📋</span>
          <span style={{fontWeight:600,fontSize:13,color:'#1E40AF'}}>ベースシフト（2週間定型パターン）</span>
        </div>
        <div style={{fontSize:12,color:'#1E40AF',lineHeight:1.7}}>
          通常の勤務パターンをパターンA・パターンBに分けて設定します。
          <strong>1月1日からの通算週番号で A/B を交互に判定</strong>するため、月をまたいでも同じパターンが連続することはありません。
          <br/>
          各コマのスタッフバッジをクリックすると、ON/OFFを切り替えられます（背景が濃い色＝割り当て中）。
          <br/>
          <span style={{fontWeight:600}}>新しい月を開いたとき、空いている日にベースシフトが自動展開されます。</span>
        </div>
      </div>

      {/* ── 当月のA/B割当プレビュー ── */}
      <CurrentMonthPatternPreview y={y} m={m}/>

      {/* ── JSON取込/書出ボタン ── */}
      <div style={{background:'#FEF3C7',border:'1px solid #FCD34D',borderRadius:K.rlg,padding:12,marginBottom:14}}>
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
          <span style={{fontSize:14}}>📥</span>
          <span style={{fontWeight:600,fontSize:13,color:'#92400E'}}>ベースシフトJSON取込/書出</span>
        </div>
        <div style={{fontSize:11,color:'#92400E',lineHeight:1.6,marginBottom:8}}>
          スタッフ名・曜日名・コマ名で書かれたわかりやすいJSON形式で、ベースシフトを一括登録/書出できます。

        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>

            📥 JSON取込

          </label>
          <button onClick={handleExportBaseShift}
            style={{padding:'6px 14px',border:'1px solid #B45309',borderRadius:K.rmd,background:'#fff',color:'#B45309',cursor:'pointer',fontSize:12,fontWeight:600}}>
            📤 JSON書出

          <span style={{fontSize:11,color:'#92400E',alignSelf:'center'}}>
            ※ 取込時は既存のベースシフトを上書きします

        </div>
      </div>

      {/* ── 操作ボタン ── */}
      <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:14,alignItems:'center'}}>
        <div style={{display:'flex',background:K.bgS,borderRadius:K.rmd,padding:3}}>
          {['A','B'].map(p=>(
            <button key={p} onClick={()=>setActivePattern(p)}
              style={{padding:'6px 18px',border:'none',borderRadius:K.rmd-2,background:activePattern===p?K.bgI:'transparent',color:activePattern===p?K.textI:K.textS,cursor:'pointer',fontSize:13,fontWeight:activePattern===p?600:400}}>
              パターン{p}
            </button>
          ))}
        </div>
        <span style={{fontSize:11,color:K.textS,marginLeft:10}}>
          ※ 1月1日から通算で1週目=A、2週目=B、3週目=A...と交互に適用されます
        </span>
        <div style={{marginLeft:'auto',display:'flex',gap:6}}>
          <button onClick={()=>copyPattern(activePattern,activePattern==='A'?'B':'A')}
            style={{padding:'5px 12px',border:K.bd2,borderRadius:K.rmd,background:K.bg,color:K.text,cursor:'pointer',fontSize:11}}>

          </button>
          <button onClick={handleClear}

          <button onClick={handleApply}
            style={{padding:'5px 14px',border:'none',borderRadius:K.rmd,background:K.bgI,color:'#fff',cursor:'pointer',fontSize:12,fontWeight:600}}>
            ⚡ {y}年{m}月に適用
          </button>
        </div>
      </div>

      {/* ── 編集グリッド ── */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit, minmax(280px, 1fr))',gap:12}}>
        {dows.map(dow=>{
          const dowName=['','月','火','水','木','金','土'][dow];
          const isSat=dow===6;
          const slotsForDay=slots[dow]||[];
          return(
            <div key={dow} style={{background:K.bg,border:K.bd,borderRadius:K.rlg,padding:12}}>
              <div style={{fontWeight:600,fontSize:14,marginBottom:10,paddingBottom:6,borderBottom:K.bd,color:isSat?'#92400E':K.text}}>
                {dowName}曜

              {slotsForDay.length===0?(
                <div style={{fontSize:11,color:K.textS}}>この曜日にはコマがありません</div>
              ):slotsForDay.map(slot=>{
                const sc=getSlotColor(slot);
                const assigned=baseShift[activePattern]?.[dow]?.[slot.id]||[];
                return(
                  <div key={slot.id} style={{marginBottom:10,padding:'8px 10px',borderRadius:K.rmd,borderLeft:'3px solid '+sc.border,background:sc.bgLight}}>

// ── 退勤時刻チェック（全スタッフ×全日：帰宅（早退）になっている箇所と理由を一覧） ──
function LeaveAudit({staff,dates,asgn,manualExclusions,tmps,slots,y,m,onClose}){
  const AM_OFF=['am_out','am_surg','surg'], PM_OFF=['pm_surg','pm_out','pm1','pm2'];
  const byStaff={}; let nTsuro=0,nCond=0;
  (staff||[]).forEach(s=>{byStaff[s.id]={name:s.name,color:s.color,tsuro:[],cond:[]};});
  (dates||[]).forEach(d=>{
    const dk=tdk(d),dow=d.getDay();
    const da=asgn[dk]||{}, dExcl=manualExclusions[dk]||{}, dt=tmps[dk]||{};
    const daySlots=slots[dow]||[];
    (staff||[]).forEach(s=>{
      if(!byStaff[s.id])return;
      const tc=dt[String(s.id)];
      if(tc&&['off','paid'].includes(tc.type))return; // 終日休/有給
      const cap=bothSurgeryCap(da,s.id,dow,dExcl);
      const condEnd=staffEndMin(s,dow);
      const lim=effEndMin(s,dow,da,dExcl);
      daySlots.forEach(slot=>{
        if(!(da[slot.id]||[]).includes(s.id))return;
        if((dExcl[slot.id]||[]).includes(s.id))return;
        if(tc&&tc.type==='paid_am'&&AM_OFF.includes(slot.id))return;
        if(tc&&tc.type==='paid_pm'&&PM_OFF.includes(slot.id))return;
        const note=leaveNoteForSlot(s,slot,dow,da,dExcl);
        if(!note)return;
        const leave=note.replace(/[()帰]/g,'');
        const isTsuro=(cap!=null&&lim===cap&&(condEnd==null||cap<=condEnd));
        const row={mo:d.getMonth()+1,day:d.getDate(),dow:dow,label:slot.label,leave:leave};
        if(isTsuro){byStaff[s.id].tsuro.push(row);nTsuro++;}
        else{byStaff[s.id].cond.push({...row,condEnd:condEnd});nCond++;}
      });
    });
  });
  const ids=Object.keys(byStaff).filter(id=>byStaff[id].tsuro.length||byStaff[id].cond.length);
  return(
    <div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.45)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:2000,padding:16}}>
      <div onClick={e=>e.stopPropagation()} style={{background:'#fff',borderRadius:14,width:'100%',maxWidth:680,maxHeight:'86vh',overflowY:'auto',padding:20,boxShadow:'0 8px 32px rgba(0,0,0,0.2)'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
          <div style={{fontWeight:700,fontSize:16}}>🕖 退勤時刻チェック（{y}年{m}月）</div>
          <button onClick={onClose} style={{border:'none',background:'none',fontSize:20,cursor:'pointer',color:'#64748B'}}>×</button>
        </div>
        <div style={{fontSize:12,color:'#475569',background:'#F1F5F9',borderRadius:8,padding:'8px 12px',marginBottom:14,lineHeight:1.7}}>
          この月で「帰（早退）」が付く全箇所を、理由つきで一覧にしています。理由は次の2つだけのはずです：<br/>
          ・<b style={{color:'#9A3412'}}>通し手術</b>（午前手術＋午後手術の両方に実働）＝6時間勤務で15:30退勤の労務ルール<br/>
          ・<b style={{color:'#1D4ED8'}}>勤務条件</b>（各自の「◯時まで」設定）<br/>
          合計：通し手術 <b>{nTsuro}</b> 件／勤務条件 <b>{nCond}</b> 件。意図しないものがあれば、そのスタッフの勤務条件を確認してください。
        </div>
        {ids.length===0
          ?<div style={{textAlign:'center',padding:'24px 0',color:'#166534',fontSize:14,fontWeight:600}}>✓ 早退（帰）になっている箇所はありません</div>
          :ids.map(id=>{
            const b=byStaff[id];
            return(
              <div key={id} style={{border:'1px solid #E2E8F0',borderRadius:10,padding:'10px 12px',marginBottom:10}}>
                <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:6}}>
                  <span style={{width:9,height:9,borderRadius:'50%',background:b.color,flexShrink:0}}/>
                  <span style={{fontWeight:700,fontSize:14}}>{b.name}</span>
                </div>
                {b.tsuro.length>0&&<div style={{marginBottom:b.cond.length?6:0}}>

          })}
      </div>
    </div>

}
// ── スタッフごとの勤務チェック（勤務条件との適合＋日別の出退勤・休憩・実働） ──
function StaffCheckPanel({staff,dates,asgn,manualExclusions,tmps,slots,weeks,y,m,holidays,manualClosedDays,onClose}){
  const AM_OFF=['am_out','am_surg','surg'], PM_OFF=['pm_surg','pm_out','pm1','pm2'];
  // 労基法 第34条：労働時間が6時間超→45分、8時間超→60分、それ以下→0（拘束時間を目安に判定）
  const legalBreak=(span)=> span>480?60 : span>360?45 : 0;
  const isClosed=dk=>{const mc=(manualClosedDays||{})[dk];if(mc===false)return false;if(mc===true)return true;return !!((holidays||{})[dk]);};
  // その週の診療日数（月〜土・休診除く）。フル週=6日。短い週(月初・月末)は6日換算の「補正時間」に使う。
  const clinicDays=wk=>wk.filter(d=>(slots[d.getDay()]||[]).length>0 && !isClosed(tdk(d))).length;
  function buildDay(s,d){
    const dk=tdk(d),dow=d.getDay(),da=asgn[dk]||{},dExcl=manualExclusions[dk]||{};
    const tc=tmps[dk]?.[String(s.id)];
    if(tc&&['off','paid'].includes(tc.type))return null; // 終日休/有給
    const assigned=(slots[dow]||[]).filter(slot=>{
      if(!(da[slot.id]||[]).includes(s.id))return false;
      if((dExcl[slot.id]||[]).includes(s.id))return false;
      if(tc&&tc.type==='paid_am'&&AM_OFF.includes(slot.id))return false;
      if(tc&&tc.type==='paid_pm'&&PM_OFF.includes(slot.id))return false;
      return true;
    });
    if(assigned.length===0)return null;
    const rs=assigned.map(sl=>slotRangeMin(sl)).filter(r=>r&&r.s!=null&&r.e!=null);
    if(rs.length===0)return null;
    let start=Math.min.apply(null,rs.map(r=>r.s)), end=Math.max.apply(null,rs.map(r=>r.e));
    const lv=effEndMin(s,dow,da,dExcl); if(lv!=null&&lv<end)end=lv;
    const span=Math.max(0,end-start), brk=legalBreak(span), work=Math.max(0,span-brk);
    const issues=[];
    if(!staffWorksDow(s,dow))issues.push('勤務不可の曜日に配置');
    const cs=staffStartMin(s,dow), ce=staffEndMin(s,dow);
    if(cs!=null&&start<cs)issues.push('出勤'+fmtHM(start)+'が条件('+fmtHM(cs)+'〜)より早い');
    if(ce!=null&&end>ce)issues.push('退勤'+fmtHM(end)+'が条件(〜'+fmtHM(ce)+')より遅い');
    if(work>480)issues.push('実働8時間超');
    // スキル別チェック：外来のみ→手術コマ不可 / 手術のみ→外来コマ不可
    const sk=staffSkill(s);
    if(sk==='out'){const ng=assigned.filter(sl=>sl.type==='surg'); if(ng.length)issues.push('外来のみだが手術コマに配置('+ng.map(sl=>sl.label).join('・')+')');}
    if(sk==='surg'){const ng=assigned.filter(sl=>sl.type==='out'); if(ng.length)issues.push('手術のみだが外来コマに配置('+ng.map(sl=>sl.label).join('・')+')');}
    return {dk,d,dow,assigned,start,end,span,brk,work,issues};
  }
  const reports=staff.map(s=>{
    const wh=parseWeeklyHours(s.notes);
    const days=[]; dates.forEach(d=>{const r=buildDay(s,d); if(r)days.push(r);});
    const weekWork=weeks.map(wk=>{const set=new Set(wk.map(tdk));return days.filter(x=>set.has(x.dk)).reduce((a,x)=>a+x.work,0);});
    const monthWork=days.reduce((a,x)=>a+x.work,0);
    const dayIssues=days.filter(x=>x.issues.length>0);
    const weekRows=weeks.map((wk,i)=>{const cd=clinicDays(wk);const actH=weekWork[i]/60;const corrH=(cd>0&&cd<6)?actH*6/cd:actH;return {i,cd,actH,corrH,short:cd<6};});
    const weekFlags=[];
    weekRows.forEach(r=>{ if(weekWork[r.i]<=0)return;
      // 最低時間は「6日換算の補正時間」で達成判定（短い週を不当に未達としない）
      if(wh&&wh.min>0&&r.corrH<wh.min-0.05)weekFlags.push('第'+(r.i+1)+'週 実働'+r.actH.toFixed(1)+'h'+(r.short?'（補正'+r.corrH.toFixed(1)+'h）':'')+'（最低'+wh.min+'h未達）');
      // 上限・週40hは実働（実際に働いた時間）で判定
      if(wh&&wh.max<40&&r.actH>wh.max+0.05)weekFlags.push('第'+(r.i+1)+'週 実働'+r.actH.toFixed(1)+'h（上限'+wh.max+'h超）');
      if(r.actH>40.05)weekFlags.push('第'+(r.i+1)+'週 実働'+r.actH.toFixed(1)+'h（週40h超）');
    });
    const ok=dayIssues.length===0&&weekFlags.length===0;
    return {s,wh,days,weekWork,weekRows,monthWork,dayIssues,weekFlags,ok};
  });
  const fmtH=min=>(min/60).toFixed(1);
  const slotNames=arr=>arr.map(sl=>sl.label).join('・');
  const condStr=s=>{const wh=parseWeeklyHours(s.notes);return [skillLabel(staffSkill(s)),wh&&wh.min>0?'週'+wh.min+'h以上':null,wh&&wh.max<40?'週'+wh.max+'h以内':null].filter(Boolean).join(' / ');};
  function printReport(){

    let h='<!doctype html><html><head><meta charset="utf-8"><title>スタッフ別勤務チェック '+y+'-'+m+'</title>';
    h+='<style>body{font-family:-apple-system,Segoe UI,Hiragino Sans,sans-serif;padding:20px;color:#111}h1{font-size:18px}h2{font-size:14px;margin:16px 0 3px;border-bottom:2px solid #333;padding-bottom:2px}.cond{font-size:12px;color:#333;margin:2px 0 5px}table{border-collapse:collapse;width:100%;font-size:11px;margin-bottom:6px}th,td{border:1px solid #888;padding:3px 5px;text-align:center}th{background:#eee}.l{text-align:left}.ng{color:#b00;font-weight:bold}.ok{color:#157347;font-weight:bold}@media print{.np{display:none}}</style></head><body>';
    h+='<button class="np" onclick="window.print()" style="position:fixed;top:8px;right:8px;padding:8px 14px;font-size:14px;font-weight:700;background:#185FA5;color:#fff;border:none;border-radius:8px;cursor:pointer">🖨 印刷</button>';

    h+='<div class=cond>休憩は労働基準法に準拠（労働6時間超で45分、8時間超で60分）。拘束＝出勤〜退勤、実働＝拘束−休憩。</div>';
    reports.forEach(r=>{

      h+='<div class=cond>勤務条件: '+condStr(r.s)+'　／　月間実働 '+fmtH(r.monthWork)+'h（'+r.days.length+'日）</div>';
      if(!r.ok){ h+='<div class=cond ng>';
        r.weekFlags.forEach(f=>h+='⚠ '+f+'<br>');

        h+='</div>'; }
      h+='<table><tr><th>日付</th><th class=l>担当</th><th>出勤〜退勤</th><th>拘束</th><th>休憩</th><th>実働</th><th class=l>備考</th></tr>';
      r.days.forEach(x=>{ h+='<tr><td>'+(x.d.getMonth()+1)+'/'+x.d.getDate()+'('+DAY_JP[x.dow]+')</td><td class=l>'+slotNames(x.assigned)+'</td><td>'+fmtHM(x.start)+'〜'+fmtHM(x.end)+'</td><td>'+fmtH(x.span)+'h</td><td>'+(x.brk?x.brk+'分':'なし')+'</td><td>'+fmtH(x.work)+'h</td><td class="l '+(x.issues.length?'ng':'')+'">'+(x.issues.join('、')||'—')+'</td></tr>'; });
      if(r.days.length===0)h+='<tr><td colspan=7>この月の勤務はありません</td></tr>';
      h+='</table>';
    });
    h+='</body></html>'; w.document.write(h); w.document.close();
  }
  const td={border:'1px solid #E2E8F0',padding:'3px 6px'};
  return(
    <div style={{background:'#fff',border:'2px solid #185FA5',borderRadius:12,marginBottom:14,overflow:'hidden'}}>

        <div style={{fontSize:11,color:'#64748B',marginBottom:10}}>休憩は労働基準法に準拠（労働6時間超で45分、8時間超で60分、それ以下はなし）。拘束＝出勤〜退勤、実働＝拘束−休憩。各自の「勤務できる曜日・時間」「週の上限／下限」との適合も判定しています。</div>

                    const weekHasWork=weeks[i].some(d=>{
                      const dk=tdk(d),da=asgn[dk]||{},dExcl=manualExclusions[dk]||{};
                      return Object.entries(da).some(([slotId,ids])=>
                        (ids||[]).some(sid=>sid===s.id&&!(dExcl[slotId]||[]).includes(sid)));
                    });
                    const under=!isShortWeek&&weekHasWork&&minH>0&&wh2>0&&wh2<minH;
                    return(
                      <td key={i} style={tdS(over,warn,under,false)}>
                        {wh2>0?(
                          <span>
                            {wh2.toFixed(1)}h
                            {over&&<span style={{marginLeft:2,fontSize:10}}>⚠</span>}
                            {under&&<span style={{marginLeft:2,fontSize:10}} title={'最低'+minH+'h必要'}>↑</span>}
                          </span>
                        ):'—'}
                      </td>
                    );
                  })}
                  <td style={tdS(false,false,false,true)}>{total>0?total.toFixed(1)+'h':'—'}</td>
                  <td style={{...tdS(false,false,false,false),color:'#64748B'}}>{slots_cnt>0?slots_cnt+'コマ':'—'}</td>
                </tr>
              );
            })}
          </tbody>
          <tfoot>
            <tr>
              <td style={{padding:'6px 10px',border:'1px solid #E2E8F0',fontSize:11,fontWeight:700,color:'#64748B',background:'#F1F5F9'}}>合計</td>
              {weeks.map((_,i)=>{
                const tot=rows.reduce((sum,{whs})=>sum+whs[i],0);
                return <td key={i} style={{padding:'6px 10px',border:'1px solid #E2E8F0',fontSize:11,fontWeight:700,textAlign:'center',background:'#F1F5F9',color:'#1E293B'}}>{tot>0?tot.toFixed(1)+'h':'—'}</td>;
              })}
              <td style={{padding:'6px 10px',border:'1px solid #E2E8F0',fontSize:11,fontWeight:700,textAlign:'center',background:'#E0F2FE',color:'#0F766E'}}>
                {rows.reduce((sum,{total})=>sum+total,0).toFixed(1)}h
              </td>
              <td style={{padding:'6px 10px',border:'1px solid #E2E8F0',fontSize:11,fontWeight:700,textAlign:'center',background:'#F1F5F9',color:'#64748B'}}>
                {rows.reduce((sum,{slots_cnt})=>sum+slots_cnt,0)}コマ
              </td>
            </tr>
          </tfoot>
        </table>
      </div>
    </div>
  );
}

function PatCard({p,isOn,staff,weeks,slots,y,patReqList,finalizeAsgn,onApply}){
  // p.assign のキーは "MM-DD" 形式 → "YYYY-MM-DD" 形式に変換してから制約適用
  const convertedAsgn={};
  Object.entries(p.assign||{}).forEach(([mmdd,sls])=>{
    const dk=(y?y+'-':'')+mmdd;
    convertedAsgn[dk]={};
    Object.entries(sls).forEach(([slotId,ids])=>{
      convertedAsgn[dk][slotId]=Array.isArray(ids)?[...ids]:[];
    });
  });

  // 実際に適用されるのと同じ手順（ベースシフト土台＋AI＋時間調整＋補完）で集計する。
  // finalizeAsgn が無い場合のみ従来の時間調整のみにフォールバック。
  let enforcedAsgn;
  try{
    enforcedAsgn=finalizeAsgn?finalizeAsgn(convertedAsgn):(weeks&&slots?enforceHourLimits(convertedAsgn,staff,weeks,slots):convertedAsgn);
  }catch(err){
    // プレビュー集計でエラーが起きても画面全体が真っ白にならないよう、AI結果そのままで表示する
    console.error('finalizeAsgn preview failed:',err);
    enforcedAsgn=convertedAsgn;
  }

  const cnt={};staff.forEach(s=>{cnt[s.id]=0;});
  Object.values(enforcedAsgn).forEach(ds=>{Object.values(ds).forEach(ids=>{(Array.isArray(ids)?ids:[]).forEach(sid=>{cnt[sid]=(cnt[sid]||0)+1;});});});

  // AIが生成した元のコマ数も保持（差分表示用）
  const cntRaw={};staff.forEach(s=>{cntRaw[s.id]=0;});
  Object.values(p.assign||{}).forEach(ds=>{Object.values(ds).forEach(ids=>{(Array.isArray(ids)?ids:[]).forEach(sid=>{cntRaw[sid]=(cntRaw[sid]||0)+1;});});});

  const maxC=Math.max(1,...staff.map(s=>cnt[s.id]||0));
  const active=staff.filter(s=>(cnt[s.id]||0)>0||(cntRaw[s.id]||0)>0).sort((a,b)=>(cnt[b.id]||0)-(cnt[a.id]||0));

  // ── このパターンを適用した場合の空き枠（未充足コマ）を算出 ──
  // 必要人数に対し配置が足りないコマ数を集計（時間制約適用後の配置で判定）
  let emptySlots=0, totalReq=0;
  (patReqList||[]).forEach(({dk,reqBySlot})=>{
    Object.entries(reqBySlot).forEach(([slotId,req])=>{
      totalReq+=req;
      const assigned=(enforcedAsgn[dk]?.[slotId]||[]).length;
      if(assigned<req)emptySlots+=(req-assigned);
    });
  });
  const filledRate=totalReq>0?Math.round((totalReq-emptySlots)/totalReq*100):100;

  return(
    <div style={{flex:'1 1 175px',minWidth:175,maxWidth:255,background:isOn?K.bgI:K.bgS,border:isOn?'2px solid '+K.textI:K.bd,borderRadius:K.rlg,padding:12}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:4}}>
        <span style={{fontWeight:500,fontSize:14,color:isOn?K.textI:K.text}}>{p.name}</span>
        {isOn&&<span style={{fontSize:10,color:K.textI,background:K.bg,border:K.bdI,borderRadius:10,padding:'1px 7px'}}>適用中</span>}
      </div>
      <p style={{fontSize:12,color:K.textS,lineHeight:1.5,marginBottom:6}}>{p.desc}</p>
      {/* 空き枠（未充足コマ）数 */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:6,marginBottom:8,padding:'7px 9px',borderRadius:K.rmd,
        background:emptySlots===0?K.bgG:emptySlots<=3?K.bgW:K.bgD,
        border:emptySlots===0?K.bdG:emptySlots<=3?K.bdW:K.bdD}}>
        <span style={{fontSize:11,fontWeight:500,color:emptySlots===0?K.textG:emptySlots<=3?K.textW:K.textD}}>
          {emptySlots===0?'空き枠なし':'空き枠'}
        </span>
        <span style={{display:'flex',alignItems:'baseline',gap:3}}>
          <span style={{fontSize:18,fontWeight:700,color:emptySlots===0?K.textG:emptySlots<=3?K.textW:K.textD}}>{emptySlots}</span>
          <span style={{fontSize:11,color:emptySlots===0?K.textG:emptySlots<=3?K.textW:K.textD}}>コマ</span>
        </span>
      </div>
      <div style={{fontSize:10,color:K.textS,marginBottom:8,padding:'3px 6px',background:K.bgT,borderRadius:4}}>
        ※ 時間制約適用後の実際のコマ数（充足率 {filledRate}%）
      </div>
      <div style={{marginBottom:10}}>
        {active.slice(0,6).map(s=>{
          const reduced=cntRaw[s.id]>cnt[s.id];
          return(
            <div key={s.id} style={{display:'flex',alignItems:'center',gap:6,marginBottom:4}}>
              <span style={{width:7,height:7,borderRadius:'50%',background:s.color,flexShrink:0}}/>
              <span style={{fontSize:11,width:32,color:K.text,flexShrink:0}}>{s.name}</span>
              <div style={{flex:1,height:5,background:K.bgT,borderRadius:3,overflow:'hidden'}}><div style={{height:'100%',background:s.color,width:Math.round((cnt[s.id]||0)/maxC*100)+'%',borderRadius:3}}/></div>
              <span style={{fontSize:11,width:'auto',textAlign:'right',flexShrink:0,color:reduced?'#D85A30':K.textS}}>
                {cnt[s.id]||0}
                {reduced&&<span style={{fontSize:9,marginLeft:2}}>({cntRaw[s.id]}→)</span>}
              </span>
            </div>
          );
        })}
        {active.length>6&&<div style={{fontSize:11,color:K.textS,marginTop:3}}>他 {active.length-6}名...</div>}
      </div>
      <button onClick={onApply} style={{width:'100%',padding:'7px',border:isOn?K.bdI:K.bd2,borderRadius:K.rmd,background:isOn?K.bgI:K.bg,color:isOn?K.textI:K.text,cursor:'pointer',fontSize:12,fontWeight:500}}>
        {isOn?'✓ 適用済み':'このパターンを適用'}
      </button>
    </div>
  );
}

function GapSec({gaps,staff,m,y,allSlots,onJump}){

                  <div style={{display:'flex',flexDirection:'column',gap:5}}>

                      const s=staff.find(x=>x.id===c.id||x.name===c.name);

                        <div key={j} style={{display:'flex',alignItems:'flex-start',gap:8,padding:'7px 10px',background:K.bg,borderRadius:K.rmd,border:K.bd}}>
                          {s&&<span style={{width:8,height:8,borderRadius:'50%',background:s.color,flexShrink:0,marginTop:3}}/>}

                        </div>
                      );
                    })}
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}
